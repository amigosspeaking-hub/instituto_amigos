function buildSelect(id, letters) {
    let opts = '<option value="">-- اختر --</option>';
    if (typeof SELECT_OPTIONS !== 'undefined' && SELECT_OPTIONS[letters]) {
        SELECT_OPTIONS[letters].forEach(o => opts += `<option value="${o.v}">${o.t}</option>`);
    } else {
        const arr = Array.isArray(letters) ? letters : letters.split('');
        arr.forEach(l => opts += `<option value="${l}">${l}</option>`);
    }
    return `<select id="${id}">${opts}</select><div class="feedback" id="fb${id.substring(1)}"></div>`;
}
function buildInput(id, ph) { return `<input type="text" id="${id}" placeholder="${ph||''}"><div class="feedback" id="fb${id.substring(1)}"></div>`; }
function buildTextarea(id, ph) { return `<textarea id="${id}" placeholder="${ph||''}"></textarea><div class="feedback" id="fb${id.substring(1)}"></div>`; }
function buildAudio(p) { return `<div class="audio-card"><div class="audio-icon">🎧</div><div class="audio-info"><div class="audio-label">Pista ${p}</div><audio controls preload="none"><source src="${AUDIO_BASE}${String(p).padStart(2,'0')}%20Pista%20${p}.mp3" type="audio/mpeg"></audio></div></div>`; }
function buildWordBank(w) { return `<div class="word-bank">${w.map(x=>`<span>${x}</span>`).join('')}</div>`; }
function buildOptionsList(o) { return `<div class="options-list">${o.map(x=>`<span class="opt">${x}</span>`).join('')}</div>`; }
function buildTranscriptBtn(k) {
    const tr = TRANSCRIPTIONS[k];
    if (!tr) return '';
    return `<button class="transcript-btn" id="trBtn_${k}" onclick="openTranscript('${k}')" disabled><span class="lock-icon">🔒</span><span>📝 عرض النص (Transcripción)</span><span class="progress-text" id="trProg_${k}">0/${tr.requiredQuestions.length}</span></button>`;
}
function buildQuestion(q) {
    let h = '';
    if (q.label) h = `<div class="q-label">${q.label}</div>`;
    else if (q.n !== undefined && q.n !== '') h = `<div class="q-label"><span class="num-bullet">${q.n}</span></div>`;
    if (q.text) h += `<div class="q-text">${q.text}</div>`;
    if (q.sel) h += buildSelect(q.id, q.sel);
    else if (q.input) h += buildInput(q.id, q.placeholder);
    else if (q.textarea) h += buildTextarea(q.id, q.placeholder);
    let fbNeeded = true;
    if (q.text && q.text.includes('feedback')) fbNeeded = false;
    if (q.ids) { q.ids.forEach(id => { fbNeeded = false; }); }
    if (fbNeeded && q.id && !q.sel && !q.input && !q.textarea) {
        h += `<div class="feedback" id="fb${q.id.substring(1)}"></div>`;
    }
    return `<div class="question-card">${h}</div>`;
}

function buildSlide(s) {
    const hClass = s.type==='teacher'?'teacher':s.type==='whatsapp'?'whatsapp':'';
    const badge = s.type==='teacher'?'<span class="ex-type-badge badge-teacher">👨‍🏫 يصححه المدرس</span>':s.type==='whatsapp'?'<span class="ex-type-badge badge-whatsapp">📱 واتس اب</span>':'<span class="ex-type-badge badge-auto">🤖 تصحيح تلقائي</span>';
    let body = '';
    if (s.arabic) body += `<div class="arabic-box">${s.arabic}</div>`;
    if (s.hint) body += `<div class="hint-box">${s.hint}</div>`;
    
    if (s.custom==='slide1') body += buildSlide1();
    else if (s.custom==='slide2') body += buildSlide2();
    else if (s.custom==='slide3') body += buildSlide3();
    else if (s.custom==='slide5') body += buildSlide5();
    else if (s.custom==='slide7') body += buildSlide7();
    else if (s.custom==='slide8') body += buildSlide8();
    else if (s.custom==='slide9') body += buildSlide9();
    else if (s.custom==='slide10') body += buildSlide10();
    else if (s.custom==='slide11') body += buildSlide11();
    else if (s.custom==='slide13') body += buildSlide13();
    else if (s.custom==='slide15') body += buildSlide15();

    else {
        body += `<div class="spanish-box">`;
        if (s.spanish) body += `<div class="es-instruction">${s.spanish}</div>`;
        if (s.audios) {
            s.audios.forEach(p => body += buildAudio(p));
            if (s.transcriptKey) body += buildTranscriptBtn(s.transcriptKey);
        }
        if (s.wordBank && !s.custom) body += buildWordBank(s.wordBank, s.exNum);
        if (s.options) body += buildOptionsList(s.options);
        if (s.example) body += `<div class="example-solved">✅ ${s.example}</div>`;
        if (s.teacherNote) body += `<div class="teacher-note">👨‍🏫 سيتم تصحيح هذه الإجابات بواسطة المدرس</div>`;
        if (s.questions) s.questions.forEach(q => body += buildQuestion(q));
        if (s.triples) {
            s.triples.forEach(t => {
                body += `<div class="question-card"><div class="q-label"><span class="num-bullet">${t.n}</span> ${t.sentence}</div>`;
                body += `<div class="q-text">&#191;Qui&#233;n?</div><input type="text" id="${t.ids[0]}" placeholder="..."><div class="feedback" id="fb${t.ids[0].substring(1)}"></div>`;
                body += `<div class="q-text" style="margin-top:8px">&#191;Qu&#233;?</div><input type="text" id="${t.ids[1]}" placeholder="..."><div class="feedback" id="fb${t.ids[1].substring(1)}"></div>`;
                body += `<div class="q-text" style="margin-top:8px">&#191;A qui&#233;n?</div><input type="text" id="${t.ids[2]}" placeholder="..."><div class="feedback" id="fb${t.ids[2].substring(1)}"></div>`;
                body += `</div>`;
            });
        }
        body += `</div>`;
    }
    return `<div class="slide" data-slide="${s.n-1}"><div class="exercise"><div class="ex-header ${hClass}"><div class="ex-title-wrap"><div class="ex-num">${s.exNum || s.n}</div><div class="ex-title">${s.title}</div></div><div class="ex-actions">${badge}<button class="ex-page-btn" onclick="openPage(${s.page})">📄 صفحة ${s.page}</button></div></div><div class="ex-body">${body}</div></div></div>`;
}

function initSlider() {
    const slides = document.querySelectorAll('.slide');
    totalSlides = slides.length;
    document.getElementById('totalSlidesNum').textContent = totalSlides;
    const jc = document.getElementById('slideJumpButtons');
    jc.innerHTML = '';
    for (let i=0; i<totalSlides; i++) {
        const btn = document.createElement('button');
        btn.className = 'jump-btn'; btn.textContent = i+1;
        btn.onclick = () => goToSlide(i); btn.id = 'jumpBtn_'+i;
        jc.appendChild(btn);
    }
    if (slides.length > 0) slides[0].classList.add('active');
    updateSlider();
}
function goToSlide(i) {
    if (i<0 || i>=totalSlides) return;
    document.querySelectorAll('audio').forEach(a => { try{a.pause();}catch(e){} });
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.slide')[i].classList.add('active');
    currentSlide = i;
    updateSlider();
    window.scrollTo({top:0,behavior:'smooth'});
}
function nextSlide() { if (currentSlide < totalSlides-1) goToSlide(currentSlide+1); }
function prevSlide() { if (currentSlide > 0) goToSlide(currentSlide-1); }
function updateSlider() {
    document.getElementById('currentSlideNum').textContent = currentSlide+1;
    document.getElementById('slideProgressFill').style.width = ((currentSlide+1)/totalSlides*100)+'%';
    document.getElementById('prevBtn').disabled = currentSlide===0;
    document.getElementById('nextBtn').disabled = currentSlide===totalSlides-1;
    for (let i=0; i<totalSlides; i++) {
        const btn = document.getElementById('jumpBtn_'+i);
        if (btn) btn.classList.toggle('active', i===currentSlide);
    }
    updateJumpButtonStatus();
}
function updateJumpButtonStatus() {
    document.querySelectorAll('.slide').forEach((slide,i) => {
        const btn = document.getElementById('jumpBtn_'+i);
        if (!btn) return;
        const inputs = slide.querySelectorAll('input, select, textarea');
        let total=0, locked=0, pending=0;
        inputs.forEach(el => {
            if (!el.id || !el.id.startsWith('q')) return;
            total++;
            if (lockedAnswers[el.id]) {
                if (lockedAnswers[el.id].status==='pending') pending++;
                else locked++;
            }
        });
        btn.classList.remove('completed','has-pending');
        if (pending > 0) btn.classList.add('has-pending');
        else if (total > 0 && locked >= total) btn.classList.add('completed');
    });
}
document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    if (e.key==='ArrowLeft') nextSlide();
    if (e.key==='ArrowRight') prevSlide();
});

function normalize(s) { return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/\./g,'').replace(/,$/g,'').replace(/¿/g,'').replace(/¡/g,'').replace(/→/g,'').replace(/\u00a0/g,' '); }
function gradeAutoQuestion(qId, value) {
    const m = AUTO_GRADED[qId];
    if (!m) return null;
    const ua = String(value||'').trim(); if (!ua) return null;
    let ok = false;
    if (m.t === 'select') ok = m.a.some(x => String(x).toLowerCase() === ua.toLowerCase());
    else ok = m.a.some(x => normalize(x) === normalize(ua));
    return { isCorrect:ok, correctAnswer: m.d || m.a[0] };
}

function lockField(el) {
    if (!el) return;
    el.disabled = true;
    el.readOnly = true; el.setAttribute('data-locked','true');
    el.addEventListener('input', preventEdit);
    el.addEventListener('beforeinput', preventEdit);
    el.addEventListener('paste', preventEdit);
    el.addEventListener('cut', preventEdit);
    el.addEventListener('keydown', preventEditKey);
}
function preventEdit(e) { if (e.target.getAttribute('data-locked')==='true') { e.preventDefault(); return false; } }
function preventEditKey(e) {
    if (e.target.getAttribute('data-locked')==='true') {
        const allowed = ['Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','PageUp','PageDown'];
        if (allowed.includes(e.key)) return;
        if (e.ctrlKey && (e.key==='c' || e.key==='a')) return;
        e.preventDefault(); return false;
    }
}

function buildExplanationHTML(exp) {
    if (!exp) return '';

    if (typeof exp === 'string') {
        return `💡 <strong>الشرح:</strong><br>${esc(exp).replace(/\n/g,'<br>')}`;
    }
    if (exp.ar) html += `💡 <strong>الشرح:</strong> ${esc(exp.ar)}`;
    if (exp.es) html += `<span class="es-line">📝 ${esc(exp.es)}</span>`;
    return html;
}

        html += `</div>`;
        fb.innerHTML = html;
    } else if (info.isHalf || info.verdict === 'half') {
        el.classList.add('locked-half');
        fb.className = 'feedback half';
        let html = `<div class="fb-spanish"><span class="lock-badge half">⚠️ 0.5</span><strong>📝 Tu respuesta:</strong> ${esc(info.value)}<br>`;
        if (info.expectedAnswer || ctx.expectedAnswer) html += `<strong>✅ Respuesta modelo:</strong> ${esc(info.expectedAnswer || ctx.expectedAnswer)}`;
        html += `</div><div class="fb-arabic"><strong>⚠️ نص درجة (0.5)</strong>`;
        if (info.feedback && info.feedback !== '⚠️ إجابة شبه صحيحة - نصف درجة') html += `<div class="teacher-comment"><strong>💬 المدرس:</strong> ${esc(info.feedback)}</div>`;

async function sendDataViaGET(data) {
    const ds = JSON.stringify(data);
    if (ds.length > 7000) return sendDataViaForm(data);
    const url = SCRIPT_URL + '?action=saveProgress&data=' + encodeURIComponent(ds);
    try { await fetch(url, {mode:'no-cors'}); return {success:'unknown'}; } catch(e) { throw e; }
}

function sendDataViaForm(data) {
    return new Promise((res, rej) => {
        const ifn = 'sub_' + Date.now();
        const iframe = document.createElement('iframe');
        iframe.name = ifn; iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method = 'POST'; form.action = SCRIPT_URL; form.target = ifn; form.style.display = 'none';
        
        for (const key in data) {
            const pi = document.createElement('input');
            pi.type = 'hidden'; pi.name = key; 
            pi.value = typeof data[key] === 'object' ? JSON.stringify(data[key]) : data[key]; 
            form.appendChild(pi);
        }
        
        document.body.appendChild(form);
        let r = false;
        const to = setTimeout(() => { if (!r) { r = true; cu(); res({ success: 'unknown' }); } }, 5000);
        const cu = () => { try { document.body.removeChild(form); } catch (e) {} setTimeout(() => { try { document.body.removeChild(iframe); } catch (e) {} }, 500); };
        iframe.onload = () => { if (!r) { r = true; clearTimeout(to); cu(); res({ success: 'unknown' }); } };
        iframe.onerror = () => { if (!r) { r = true; clearTimeout(to); cu(); rej(new Error('Form failed')); } };
        try { form.submit(); } catch (e) { r = true; clearTimeout(to); cu(); rej(e); }
    });
}

async function sendAndVerify(data) {
    try { await sendDataViaGET(data); } catch(e) { return {verified:false, error:e.message}; }
    await new Promise(r => setTimeout(r, 2500));
    try {
        const url = SCRIPT_URL + '?action=getProgress&username=' + encodeURIComponent(data.username) + '&lessonId=' + encodeURIComponent(data.lessonId) + '&_t=' + Date.now();
        const r = await fetch(url); const res = await r.json();
        if (res.status === 'success') {
            const sA = parseInt(res.totalAnswered) || 0;
            const sP = parseInt(res.totalPending) || 0;
            if (sA + sP >= data.totalAnswered + data.totalPending) return {verified:true};
            return {verified:false, error:'البيانات لم تصل بالكامل'};
        }
    } catch(e) { return {verified:false, error:'فشل التحقق'}; }
    return {verified:false, error:'فشل التحقق'};
}

async function fetchWithRetry(url, opts={}, max=3) {
    let lastErr;
    for (let i=0; i<max; i++) {
        try { return await fetch(url, opts); }
        catch(e) { lastErr=e; if (i<max-1) await new Promise(r=>setTimeout(r,1000*(i+1))); }
    }
    throw lastErr;
}

async function loadProgress() {
    try {
        const url = SCRIPT_URL + '?action=getProgress&username=' + encodeURIComponent(currentUser.username) + '&lessonId=' + encodeURIComponent(LESSON_CONFIG.lessonId) + '&_t=' + Date.now();
        const r = await fetchWithRetry(url); const res = await r.json();
        if (res.status === 'success') {
            totalCorrect = parseFloat(res.totalCorrect) || 0;
            totalWrong = parseInt(res.totalWrong) || 0;
            totalAnswered = parseInt(res.totalAnswered) || 0;
            totalPending = parseInt(res.totalPending) || 0;
            totalHalf = parseInt(res.totalHalf) || 0;
            if (res.lockedAnswers && res.lockedAnswers !== '{}') {
                try {
                    lockedAnswers = JSON.parse(res.lockedAnswers);
                    Object.keys(lockedAnswers).forEach(qId => displayLockedAnswer(qId, lockedAnswers[qId]));
                } catch(e){}
            }
            updateProgressDisplay();
            updateJumpButtonStatus();
            if (!isTeacherGradingMode) checkIfComplete();
            checkAllTranscripts();
        }
    } catch(e) { console.error(e); }
}

function collectNewAnswers() {
    const na = [];
    ALL_QUESTIONS.forEach(qId => {
        if (lockedAnswers[qId]) return;
        const el = document.getElementById(qId); if (!el) return;
        const v = el.value;
        if (!String(v).trim()) return;
        na.push({id:qId, value:v});
    });

}

function prepareSubmit() {
    const na = collectNewAnswers();
    if (na.length === 0) {
        showPopup({type:'warning',icon:'⚠️',title:'لا توجد إجابات جديدة',body:'لم تحل أي سؤال جديد. الرجاء حل بعض الأسئلة أولاً.',buttons:[{text:'حسناً',class:'primary'}]});
        return;
    }
    pendingSubmit = na;
    let ac=0, tc=0;
    na.forEach(a => { if (AUTO_GRADED[a.id]) ac++; else tc++; });
    showPopup({
        type:'warning', icon:'🤔', title:'تأكيد الإرسال',
        body:`<p>هل أنت متأكد من إرسال إجاباتك؟</p><div class="popup-detail">📊 <strong>عدد الإجابات:</strong> ${na.length}<br>🤖 تصحيح فوري: <strong>${ac}</strong><br>👨‍🏫 يصححها المدرس: <strong>${tc}</strong><br>⚠️ لن تتمكن من تعديل الإجابات بعد الإرسال!</div>`,
        buttons:[{text:'✅ نعم، أرسل',class:'primary',action:confirmSubmit},{text:'❌ إلغاء',class:'secondary',action:()=>{pendingSubmit=null;closePopup();}}]
    });
}

async function confirmSubmit() {
    closePopup();
    if (!pendingSubmit) return;
    const na = pendingSubmit; pendingSubmit = null;
    showLoading('⏳ جاري التصحيح والإرسال...', na.length+' سؤال');
    let bc=0, bw=0, bp=0;
    const fr = [];
    
    na.forEach(ans => {
        if (AUTO_GRADED[ans.id]) {
            const r = gradeAutoQuestion(ans.id, ans.value);
            fr.push({ id: ans.id, value: ans.value, status: 'reviewed', isCorrect: r.isCorrect });
            if (r.isCorrect) bc++; else bw++;
        } else {
            const ctx = TEACHER_GRADED_CONTEXT[ans.id] || {};
            fr.push({ id: ans.id, value: ans.value, status: 'pending', isCorrect: false, questionText: ctx.questionText || ans.id });
            bp++;
        }
    });
    
    const tl = JSON.parse(JSON.stringify(lockedAnswers));
    const nao = {};
    fr.forEach(r => {
        const o = { value: r.value, status: r.status, isCorrect: r.isCorrect };
        if (r.status === 'pending') { o.questionText = r.questionText; }
        tl[r.id] = o; nao[r.id] = o;
    });
    
    const ntc = totalCorrect + bc;
    const ntw = totalWrong + bw;
    const nta = totalAnswered + (bc + bw);
    const ntp = totalPending + bp;
    
    const data = {
        action: 'saveProgress', username: currentUser.username, fullName: currentUser.fullName,
        lessonId: LESSON_CONFIG.lessonId, lessonName: LESSON_CONFIG.lessonName,
        totalCorrect: ntc, totalWrong: ntw, totalAnswered: nta, totalPending: ntp, totalQuestions: LESSON_CONFIG.totalQuestions,
        batchCorrect: bc, batchWrong: bw, batchAnswered: bc + bw, batchPending: bp,
        details: `${na.length} سؤال | صح ${bc} | خطأ ${bw} | بانتظار ${bp}`,
        newAnswers: JSON.stringify(nao)
    };
    
    const r = await sendAndVerify(data);
    hideLoading();
    if (r.verified) {
        lockedAnswers = tl;
        totalCorrect=ntc; totalWrong=ntw; totalAnswered=nta; totalPending=ntp;
        fr.forEach(x => displayLockedAnswer(x.id, x));
        document.getElementById('retryBanner').style.display = 'none';
        lastFailedData = null;
        safeStorage.removeItem('ia_pending_'+LESSON_CONFIG.lessonId);
        updateProgressDisplay();
        updateJumpButtonStatus();
        checkAllTranscripts();
        showPopup({
            type:'success', icon:'✅', title:'تم الإرسال بنجاح!',
            body:`<div class="popup-detail">✅ صح: <strong style="color:#2ecc71">${bc}</strong><br>❌ خطأ: <strong style="color:#e74c3c">${bw}</strong><br>⏳ بانتظار المدرس: <strong style="color:#9b59b6">${bp}</strong></div>`,
            buttons:[{text:'👍 حسناً',class:'primary',action:()=>{closePopup();checkIfComplete();}}]
        });
    } else {
        lastFailedData = data;
        try { safeStorage.setItem('ia_pending_'+LESSON_CONFIG.lessonId, JSON.stringify({data:data, timestamp:Date.now()})); } catch(e){}
        document.getElementById('retryBanner').style.display = 'block';
        showPopup({
            type:'error', icon:'❌', title:'فشل الإرسال',
            body:`<p>حدث خطأ أثناء الإرسال.</p><div class="popup-detail">${esc(r.error || 'خطأ غير معروف')}</div>`,
            buttons:[{text:'🔄 إعادة المحاولة',class:'primary',action:()=>{closePopup();retrySubmit();}},{text:'إغلاق',class:'secondary'}]
        });
    }
}

async function retrySubmit() {
    if (!lastFailedData) {
        try { const p = safeStorage.getItem('ia_pending_'+LESSON_CONFIG.lessonId); if (p) lastFailedData = JSON.parse(p).data; } catch(e){}
        if (!lastFailedData) {
            showPopup({type:'warning',title:'لا توجد بيانات',body:'مفيش بيانات للإعادة.',buttons:[{text:'حسناً',class:'primary'}]});
            return;
        }
    }
    showLoading('جاري إعادة المحاولة...');
    const r = await sendAndVerify(lastFailedData);
    hideLoading();
    if (r.verified) {
        safeStorage.removeItem('ia_pending_'+LESSON_CONFIG.lessonId);
        lastFailedData = null;
        showPopup({type:'success',title:'تم بنجاح!',body:'تم حفظ بياناتك. سيتم إعادة تحميل الصفحة.',buttons:[{text:'حسناً',class:'primary',action:()=>location.reload()}]});
    } else {
        showPopup({type:'error',title:'فشلت المحاولة',body:esc(r.error || 'حاول مرة أخرى لاحقاً.'),buttons:[{text:'حسناً',class:'primary'}]});
    }
}

function selectVerdict(qId, verdict) {
    teacherGrades[qId] = teacherGrades[qId] || {};
    teacherGrades[qId].verdict = verdict;
    teacherGrades[qId].value = document.getElementById(qId).value;
    
    const container = document.getElementById(`grade_overlay_${qId}`);
    container.querySelectorAll('.verdict-btn').forEach(b => b.classList.remove('selected'));
    container.querySelector(`.verdict-btn.${verdict}`).classList.add('selected');
}

async function submitTeacherGrades() {
    Object.keys(teacherGrades).forEach(qId => {
        const f = document.getElementById(`t_feedback_${qId}`);
        if (f) teacherGrades[qId].feedback = f.value;
    });
    
    if (Object.keys(teacherGrades).length === 0) {
        showPopup({ type: 'warning', icon: '⚠️', title: 'تنبيه', body: 'لم تقم بتصحيح أي سؤال.', buttons: [{text: 'حسناً', class: 'primary'}]});
        return;
    }

    showLoading('⏳ جاري حفظ التصحيح...');
    
    const data = {
        action: 'saveTeacherGrading',
        username: currentUser.username,
        lessonId: LESSON_CONFIG.lessonId,
        teacherGrades: JSON.stringify(teacherGrades)
    };

    try {
        await sendDataViaForm(data);
        hideLoading();
        showPopup({ type: 'success', icon: '✅', title: 'تم بنجاح', body: 'تم حفظ التصحيح بنجاح!', buttons: [{ text: 'حسناً', class: 'primary', action: () => location.reload() }]});
    } catch (e) {
        hideLoading();
        showPopup({ type: 'error', icon: '❌', title: 'خطأ', body: 'فشل الاتصال بالسيرفر. حاول مرة أخرى.', buttons: [{text: 'حسناً', class: 'primary'}]});
    }
}

window.addEventListener('DOMContentLoaded', async function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'grading') {
        isTeacherGradingMode = true;
        document.body.classList.add('teacher-grading-mode');
        currentUser.username = urlParams.get('student') || currentUser.username;
        
        const tBanner = document.createElement('div');
        tBanner.className = 'teacher-grading-banner';
        tBanner.innerHTML = `<div class="grading-info-bar">👨‍🏫 وضع التصحيح | الطالب: <strong>${currentUser.username}</strong> <button class="save-grades-btn-top" onclick="submitTeacherGrades()">💾 حفظ التصحيح</button></div>`;
        document.body.insertBefore(tBanner, document.body.firstChild);
        
        const submitBtn = document.querySelector('.submit-final');
        if (submitBtn) {
            submitBtn.textContent = '💾 حفظ التصحيح';
            submitBtn.onclick = submitTeacherGrades;
            submitBtn.classList.remove('submit-final');
            submitBtn.style.background = 'linear-gradient(135deg, #27ae60, #16a085)';
        }
    } else {
        const scb = document.getElementById('spanishCharsBar');
        if(scb) scb.style.display = 'flex';
    }

    if(document.getElementById('lessonHeaderName')) document.getElementById('lessonHeaderName').textContent = LESSON_CONFIG.lessonName;
    if(document.getElementById('lessonHeaderBadge')) document.getElementById('lessonHeaderBadge').textContent = LESSON_CONFIG.levelDisplay;
    document.title = 'Instituto Amigos - ' + LESSON_CONFIG.levelDisplay + ' - ' + LESSON_CONFIG.lessonName;
    
    renderSlides();
    initSlider();
    updateProgressDisplay();
    checkAllTranscripts();
    
    showLoading('جاري مزامنة بياناتك...');
    await loadProgress();
    hideLoading();
    
    try {
        const p = safeStorage.getItem('ia_pending_'+LESSON_CONFIG.lessonId);
        if (p) {
            lastFailedData = JSON.parse(p).data;
            document.getElementById('retryBanner').style.display = 'block';
        }
    } catch(e){}
});
</script>
