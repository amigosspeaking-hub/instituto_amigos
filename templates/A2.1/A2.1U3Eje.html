  q1_3:{ar:"تحديد الكلمة: tú decides\nالقاعدة العامة: أفعال المجموعة الثالثة (-ir) في المضارع البسيط مع tú تنتهي بـ -es.\nمثال: Tú decides el lugar del viaje.", es:"Tú decides adónde vamos."},
  q1_4:{ar:"تحديد الكلمة: nosotros vamos\nالقاعدة العامة: الفعل ir غير منتظم، وتصريفه في المضارع البسيط مع nosotros هو vamos.\nمثال: Nosotros vamos al cine cada fin de semana.", es:"Nosotros vamos a la playa."},
  q1_5:{ar:"تحديد الكلمة: él sigue\nالقاعدة العامة: الفعل seguir أصل متحرك (e يتحول إلى i) في المضارع البسيط مع él.\nمثال: Él sigue las instrucciones del profesor.", es:"Él sigue entrenando cada día."},
  q1_6:{ar:"تحديد الكلمة: ganaste\nالقاعدة العامة: الماضي البسيط (AYER) لأفعال المجموعة الأولى (-ar) مع الضمير tú ينتهي بـ -aste.\nمثال: Ayer ganaste un premio fantástico.", es:"Ayer ganaste el campeonato."},
  q1_7:{ar:"تحديد الكلمة: viajé\nالقاعدة العامة: الماضي البسيط لأفعال المجموعة الأولى (-ar) مع الضمير yo ينتهي بـ -é مع النبرة.\nمثال: El verano pasado viajé a España.", es:"Yo viajé a Madrid en avión."},
  q1_8:{ar:"تحديد الكلمة: empecé\nالقاعدة العامة: في تصريف yo للماضي البسيط من empezar تتحول الـ z إلى c قبل الـ é للمحافظة على الصوت.\nمثال: Ayer empecé un nuevo curso.", es:"Yo empecé a estudiar español."},
  q1_9:{ar:"تحديد الكلمة: oyeron\nالقاعدة العامة: الفعل oír في الماضي البسيط مع ellos/ellas يتحول فيه حرف i المكسور إلى y بين متحركين.\nمثال: Ellos oyeron la música desde lejos.", es:"Ellos oyeron las noticias en la radio."},
  q1_10:{ar:"تحديد الكلمة: vi\nالقاعدة العامة: الفعل ver في الماضي البسيط منتظم مع yo يكون vi (بدون تيلدي لأنه مقطع واحد).\nمثال: Ayer vi una película excelente.", es:"Yo vi a Carlos en la estación."},
  q1_11:{ar:"تحديد الكلمة: participó\nالقاعدة العامة: الماضي البسيط لأفعال المجموعة الأولى (-ar) مع الضمير él/ella ينتهي بـ -ó مع النبرة.\nمثال: Juan participó en el maratón.", es:"Él participó en tres proyectos."},
  q1_12:{ar:"تحديد الكلمة: fuimos\nالقاعدة العامة: الفعل ser/ir في الماضي البسيط مع nosotros تصريفه موحد وهو fuimos.\nمثال: Nosotros fuimos amigos en la infancia.", es:"Nosotros fuimos al museo ayer."},
  q1_13:{ar:"تحديد الكلمة: se trasladó\nالقاعدة العامة: الأفعال المنعكسة في الماضي البسيط مع ella تأتي مع الضمير se وتنتهي بـ -ó.\nمثال: Ella se trasladó a otra ciudad.", es:"Ella se trasladó a vivir a Canadá."},
  q1_14:{ar:"تحديد الكلمة: durmió\nالقاعدة العامة: الفعل dormir في الماضي البسيط مع usted تتحول فيه الـ o إلى u في الجذر.\nمثال: Usted durmió diez horas ayer.", es:"Usted durmió profundamente toda la noche."},

  q2_1:{ar:"تحديد الكلمة: buscó\nالقاعدة العامة: الماضي البسيط (Indefinido) للفعل buscar مع الضمير ella ينتهي بـ -ó.\nمثال: Ella buscó información en internet.", es:"La fundación buscó un sitio idóneo."},
  q2_2:{ar:"تحديد الكلمة: fue\nالقاعدة العامة: الفعل ser في الماضي البسيط غير منتظم، ومع الضمير ella يكون fue.\nمثال: Esta fue una experiencia inolvidable.", es:"Bilbao fue la ciudad elegida."},
  q2_3:{ar:"تحديد الكلمة: ganó\nالقاعدة العامة: الماضي البسيط للفعل ganar مع él ينتهي بـ -ó على آخر مقطع.\nمثال: El equipo ganó la medalla de oro.", es:"Frank O. Gehry ganó el concurso."},
  q2_4:{ar:"تحديد الكلمة: empezó\nالقاعدة العامة: الماضي البسيط للفعل empezar مع ella ينتهي بـ -ó (تبقى الـ z كما هي قبل o).\nمثال: La clase empezó a las nueve.", es:"En 1993 empezó la construcción."},
  q2_5:{ar:"تحديد الكلمة: construyó\nالقاعدة العامة: الأفعال المنتهية بـ -uir مع él/ella تضاف لها y بين المتحركين في الماضي البسيط.\nمثال: El arquitecto construyó un puente moderno.", es:"El museo se construyó con titanio."},
  q2_6:{ar:"تحديد الكلمة: visitaron\nالقاعدة العامة: الماضي البسيط لأفعال (-ar) مع الضمير ellos ينتهي بـ -aron.\nمثال: Mis padres visitaron Barcelona.", es:"Más de un millón visitaron este museo."},

  q3_1a:{ar:"تحديد الحرف: c في empecé\nالقاعدة العامة: أفعال (-zar) عند تصريفها مع yo في الماضي البسيط تقلب الـ z إلى c قبل الحرف e.\nمثال: Yo almorcé con mis amigos.", es:"A los siete años empecé a entrenar."},
  q3_1b:{ar:"تحديد الحرف: z في empezó\nالقاعدة العامة: مع الضمير él في الماضي البسيط تبقى الـ z كما هي قبل حرف o.\nمثال: Mi hermano empezó a estudiar.", es:"Mi hermano empezó a entrenar también."},
  q3_2:{ar:"تحديد الحرف: y في leyeron\nالقاعدة العامة: أفعال (-er) و (-ir) التي ينتهي جذرها بمتحرك، تقلب الـ i إلى y مع ellos في الماضي البسيط.\nمثال: Ellos creyeron la noticia.", es:"Los estudiantes leyeron un artículo."},
  q3_3a:{ar:"تحديد الحرف: u في durmió\nالقاعدة العامة: الفعل dormir يغير حرف o إلى u في الماضي البسيط مع الضمير él/ella.\nمثال: El niño durmió bien.", es:"Ana durmió en el avión."},
  q3_3b:{ar:"تحديد الحرف: o في dormí\nالقاعدة العامة: مع الضمير yo في الماضي البسيط لا يتغير جذر الفعل dormir.\nمثال: Anoche no dormí bien.", es:"Yo no dormí nada por el estrés."},
  q3_4a:{ar:"تحديد الحرف: qu في busqué\nالقاعدة العامة: أفعال (-car) تقلب الـ c إلى qu مع yo في الماضي البسيط للحفاظ على صوت الكاف.\nمثال: Yo practiqué deporte.", es:"En 2015 busqué un trabajo."},
  q3_4b:{ar:"تحديد الحرف: c في buscamos\nالقاعدة العامة: مع nosotros في الماضي البسيط تبقى الـ c كما هي.\nمثال: Nosotros buscamos una solución.", es:"Buscamos una casa juntos."},
  q3_5a:{ar:"تحديد الحرف: í في oísteis\nالقاعدة العامة: الفعل oír يوضع عليه تيلدي على الـ i مع vosotros في الماضي البسيط.\nمثال: ¿Vosotros oísteis el ruido?", es:"¿Oísteis ayer la noticia?"},
  q3_5b:{ar:"تحديد الحرف: y في oyeron\nالقاعدة العامة: تقلب الـ i إلى y بين حرفين متحركين مع ellos في الماضي البسيط.\nمثال: Ellos oyeron la explosión.", es:"Mis padres la oyeron."},
  q3_5c:{ar:"تحديد الحرف: í في leí\nالقاعدة العامة: الفعل leer مع yo في الماضي البسيط يكتب بـ í مع تيلدي.\nمثال: Ayer leí un libro.", es:"Yo la leí en un periódico."},
  q3_6a:{ar:"تحديد الحرف: e في conseguí\nالقاعدة العامة: الفعل conseguir مع الضمير yo في الماضي البسيط يحتفظ بحرف e في الجذر.\nمثال: Yo conseguí el boleto.", es:"No conseguí entradas."},
  q3_6b:{ar:"تحديد الحرف: i في consiguieron\nالقاعدة العامة: مع الضمير ellos يقلب حرف e إلى i في الماضي البسيط للفعل conseguir.\nمثال: Ellos consiguieron el objetivo.", es:"Jaime y Caro consiguieron entradas."},

  q4_1:{ar:"تحديد الكلمة: estuvimos\nالقاعدة العامة: الفعل estar غير منتظم في الماضي البسيط، وجذره هو estuv- وينتهي مع nosotros بـ -imos.\nمثال: Ayer estuvimos en Madrid.", es:"Nosotros estuvimos en la clase."},
  q4_2:{ar:"تحديد الكلمة: quise\nالقاعدة العامة: الفعل querer غير منتظم في الماضي البسيط وجذره quis- ومع yo يكون quise.\nمثال: Yo quise llamarte anoche.", es:"Yo quise visitar el museo."},
  q4_3:{ar:"تحديد الكلمة: vinieron\nالقاعدة العامة: الفعل venir غير منتظم وجذره vin- ومع ellos يكون vinieron.\nمثال: Ellos vinieron a mi fiesta.", es:"Ellos vinieron en autobús."},
  q4_4:{ar:"تحديد الكلمة: pudiste\nالقاعدة العامة: الفعل poder غير منتظم وجذره pud- ومع tú يكون pudiste.\nمثال: ¿Pudiste resolver el ejercicio?", es:"Tú pudiste comprar la entrada."},
  q4_5:{ar:"تحديد الكلمة: hicisteis\nالقاعدة العامة: الفعل hacer غير منتظم وجذره hic- ومع vosotros يكون hicisteis.\nمثال: ¿Qué hicisteis ayer?", es:"Vosotros hicisteis un buen trabajo."},
  q4_6:{ar:"تحديد الكلمة: dije\nالقاعدة العامة: الفعل decir غير منتظم وجذره dij- ومع yo يكون dije.\nمثال: Yo te dije la verdad.", es:"Yo dije que sí."},
  q4_7:{ar:"تحديد الكلمة: pusiste\nالقاعدة العامة: الفعل poner غير منتظم وجذره pus- ومع tú يكون pusiste.\nمثال: ¿Dónde pusiste las llaves?", es:"Tú pusiste el libro en la mesa."},

  q5_1:{ar:"تحديد الفعل: celebré\nالقاعدة العامة: الأفعال المنتظمة في الماضي البسيط يقع النبر فيها على المقطع الأخير (última sílaba acentuada).\nمثال: ce-le-bré.", es:"Celebré mi graduación."},

  q5_3:{ar:"تحديد الفعل: ganó\nالقاعدة العامة: فعل منتظم، النبر على المقطع الأخير.\nمثال: ga-nó.", es:"Ganó una medalla."},
  q5_4:{ar:"تحديد الفعل: nació\nالقاعدة العامة: فعل منتظم، النبر على المقطع الأخير.\nمثال: na-ció.", es:"Nació en 1990."},

  q5_6:{ar:"تحديد الفعل: decidió\nالقاعدة العامة: فعل منتظم، النبر على المقطع الأخير.\nمثال: de-ci-dió.", es:"Decidió viajar."},
  q5_7:{ar:"تحديد الفعل: participó\nالقاعدة العامة: فعل منتظم، النبر على المقطع الأخير.\nمثال: par-ti-ci-pó.", es:"Participó en el evento."},
  q5_8:{ar:"تحديد الفعل: dije\nالقاعدة العامة: الأفعال غير المنتظمة في الماضي البسيط يقع النبر فيها على المقطع قبل الأخير (penúltima sílaba acentuada).\nمثال: di-je.", es:"Dije adiós."},
  q5_9:{ar:"تحديد الفعل: hizo\nالقاعدة العامة: فعل غير منتظم، النبر على المقطع قبل الأخير.\nمثال: hi-zo.", es:"Hizo la tarea."},
  q5_10:{ar:"تحديد الفعل: tuve\nالقاعدة العامة: فعل غير منتظم، النبر على المقطع قبل الأخير.\nمثال: tu-ve.", es:"Tuve una reunión."},
  q5_11:{ar:"تحديد الفعل: estuve\nالقاعدة العامة: فعل غير منتظم، النبر على المقطع قبل الأخير.\nمثال: es-tu-ve.", es:"Estuve en Lima."},
  q5_12:{ar:"تحديد الفعل: pude\nالقاعدة العامة: فعل غير منتظم، النبر على المقطع قبل الأخير.\nمثال: pu-de.", es:"No pude dormir."},
  q5_13:{ar:"تحديد الفعل: puso\nالقاعدة العامة: فعل غير منتظم، النبر على المقطع قبل الأخير.\nمثال: pu-so.", es:"Puso música."},
  q5_14:{ar:"تحديد الفعل: vino\nالقاعدة العامة: فعل غير منتظم، النبر على المقطع قبل الأخير.\nمثال: vi-no.", es:"Vino temprano."},

  q6a_1:{ar:"تحديد النشاط: quedarse en un hotel en las afueras\nالقاعدة العامة: حسب نص الاستماع (Pista 19)، هذا هو الحدث رقم 2 بعد الوصول في الطائرة.\nمثال: Me quedé en un hotel en las afueras.", es:"Llegué en avión y me quedé en un hotel."},
  q6a_2:{ar:"تحديد النشاط: ir a la parte vieja\nالقاعدة العامة: حسب نص الاستماع، الذهاب للبلدة القديمة وتناول البينتشوس حدث في الظهيرة (رقم 9).\nمثال: Al mediodía fui a la parte vieja.", es:"Fui a la parte vieja de la ciudad."},
  q6a_3:{ar:"تحديد النشاط: acostarse temprano\nالقاعدة العامة: في ليلة الجمعة، نامت مبكراً بسبب التعب (الحدث رقم 3).\nمثال: Me acosté temprano.", es:"Me acosté temprano por el cansancio."},
  q6a_4:{ar:"تحديد النشاط: dormir profundamente\nالقاعدة العامة: نامت بعمق طوال الليل (الحدث رقم 4).\nمثال: Dormí profundamente toda la noche.", es:"Dormí profundamente."},
  q6a_5:{ar:"تحديد النشاط: llegar en avión\nالقاعدة العامة: هذا هو الحدث الأول (رقم 1) المذكور كمثال في الكتاب وصلتها يوم الجمعة.\nمثال: El viernes llegué en avión.", es:"Llegué en avión directamente."},
  q6a_6:{ar:"تحديد النشاط: recorrer la playa de la Concha\nالقاعدة العامة: صباح السبت بدأت الجولة بالمشي على شاطئ لا كونتشا (رقم 6).\nمثال: Recorrí la playa.", es:"Recorrí la playa de la Concha."},
  q6a_7:{ar:"تحديد النشاط: empezar la visita por la ciudad\nالقاعدة العامة: في صباح السبت بدأت زيارة المدينة (رقم 5).\nمثال: Empecé la visita por la ciudad.", es:"El sábado empecé la visita."},
  q6a_8:{ar:"تحديد النشاط: beber un café\nالقاعدة العامة: في المساء شربت القهوة في ساحة الدستور (رقم 11).\nمثال: Por la tarde bebí un café.", es:"Bebí un café en la plaza."},
  q6a_9:{ar:"تحديد النشاط: conseguir entradas\nالقاعدة العامة: بالإضافة لذلك حصلت على تذاكر لحفلة موسيقية (رقم 12).\nمثال: Conseguí entradas para un concierto.", es:"Conseguí entradas."},
  q6a_10:{ar:"تحديد النشاط: tomar unos pinchos\nالقاعدة العامة: في الظهيرة تناولت المقبلات (البينتشوس) في شارع 31 أغسطس (رقم 10).\nمثال: Tomé unos pinchos.", es:"Tomé unos pinchos en los bares."},
  q6a_11:{ar:"تحديد النشاط: subir al monte Urgull\nالقاعدة العامة: صعدت إلى جبل أورغول صباح السبت (رقم 8).\nمثال: Subí al monte Urgull.", es:"Subí al monte Urgull."},
  q6a_12:{ar:"تحديد النشاط: visitar la catedral\nالقاعدة العامة: زارت كاتدرائية الراعي الصالح صباح السبت (رقم 7).\nمثال: Visité la catedral.", es:"Visité la catedral del Buen Pastor."},

  q7a_1:{ar:"تحديد التعبير: la semana pasada\nالقاعدة العامة: الماضي البسيط (Indefinido) يُستخدم مع فترات زمنية منتهية ومحددة في الماضي.\nمثال: La semana pasada estuve de viaje.", es:"Regresamos la semana pasada."},
  q7a_2:{ar:"تحديد التعبير: el año pasado\nالقاعدة العامة: يُستخدم مع الماضي البسيط للإشارة إلى عام انقضى.\nمثال: El año pasado visité Italia.", es:"Se casó el año pasado."},
  q7a_3:{ar:"تحديد التعبير: en 2014\nالقاعدة العامة: تحديد سنة محددة في الماضي يتطلب الماضي البسيط.\nمثال: En 2014 terminé mis estudios.", es:"En 2014 fui a España."},
  q7a_4:{ar:"تحديد التعبير: el mes pasado\nالقاعدة العامة: شهر انقضى يتطلب الماضي البسيط.\nمثال: El mes pasado compré un coche.", es:"Estuvo aquí el mes pasado."},
  q7a_5:{ar:"تحديد التعبير: hace mucho\nالقاعدة العامة: التعبير بـ hace + وقت في الماضي يدل على الماضي البسيط.\nمثال: Hace mucho estuve allí.", es:"Lo vi hace mucho."},
  q7a_6:{ar:"تحديد التعبير: ayer\nالقاعدة العامة: كلمة أمس (ayer) تدل مباشرة على الماضي البسيط المنتهي.\nمثال: Ayer fui al cine.", es:"Ayer por la tarde fuimos al cine."},
  q7a_7:{ar:"تحديد التعبير: hace dos años\nالقاعدة العامة: تحديد فترة انقضت منذ سنتين يتطلب الماضي البسيط.\nمثال: Hace dos años regresé de Italia.", es:"Regresé hace dos años."},
  q7a_8:{ar:"تحديد التعبير: hoy\nالقاعدة العامة: الماضي القريب (Pretérito perfecto) يُستخدم مع فترات زمنية لم تنتهِ بعد مثل اليوم (hoy).\nمثال: Hoy he trabajado mucho.", es:"Hoy hace muchísimo frío."},
  q7a_9:{ar:"تحديد التعبير: ya\nالقاعدة العامة: كلمة ya (بالفعل) تُستخدم مع الماضي القريب للتعبير عن تجربة تمت.\nمثال: Ya he visitado Madrid.", es:"Yo ya he estado en tres fiestas."},
  q7a_10:{ar:"تحديد التعبير: este año\nالقاعدة العامة: هذا العام فترة لم تنتهي بعد، فنستخدم الماضي القريب.\nمثال: Este año he viajado dos veces.", es:"Han estado en Salzburgo este año."},
  q7a_11:{ar:"تحديد التعبير: últimamente\nالقاعدة العامة: كلمة مؤخراً تدل على حدث مرتبط بالوقت الحاضر.\nمثال: Últimamente he leído mucho.", es:"Últimamente no nos hemos visto."},
  q7a_12:{ar:"تحديد التعبير: este mes\nالقاعدة العامة: هذا الشهر فترة جارية، فنستخدم الماضي القريب.\nمثال: Este mes ha ganado un premio.", es:"Este mes ha participado."},
  q7a_13:{ar:"تحديد التعبير: alguna vez\nالقاعدة العامة: تُستخدم للسؤال عن تجارب الحياة بشكل عام دون تحديد وقت منتهي.\nمثال: ¿Has subido alguna vez a esa montaña?", es:"¿Has viajado alguna vez en helicóptero?"},
  q7a_14:{ar:"تحديد التعبير: esta semana\nالقاعدة العامة: هذه الأسبوع فترة مستمرة، فنستخدم الماضي القريب.\nمثال: Esta semana hemos tenido examen.", es:"Esta semana hemos estudiado."},
  q7a_15:{ar:"تحديد التعبير: todavía no\nالقاعدة العامة: تُستخدم مع الماضي القريب لنفي حدوث شيء حتى هذه اللحظة.\nمثال: Todavía no he visto la película.", es:"Todavía no hemos terminado."},

  q7_1:{ar:"تحديد التعبير: b. este año\nالقاعدة العامة: الفعل han estado في الماضي القريب يتماشى مع ظرف زمان غير منتهي مثل este año.\nمثال: Este año han estado en Salzburgo.", es:"Mis amigos han estado en Salzburgo este año."},
  q7_2:{ar:"تحديد التعبير: a. el año pasado\nالقاعدة العامة: الفعل estuvieron في الماضي البسيط يتماشى مع ظرف زمان منتهي مثل el año pasado.\nمثال: El año pasado estuvieron en Salzburgo.", es:"También estuvieron en Salzburgo el año pasado."},
  q7_3:{ar:"تحديد التعبير: b. alguna vez\nالقاعدة العامة: السؤال بـ Has subido للسؤال عن تجربة في الحياة يتماشى مع alguna vez.\nمثال: ¿Has subido alguna vez a esa montaña?", es:"¿Has subido a esa montaña alguna vez?"},
  q7_4:{ar:"تحديد التعبير: a. la semana pasada\nالقاعدة العامة: السؤال بـ Subiste تحديداً في الماضي البسيط يتطلب ظرف منتهي مثل la semana pasada.\nمثال: ¿Subiste a la montaña la semana pasada?", es:"¿Subiste a la montaña la semana pasada?"},
  q7_5:{ar:"تحديد التعبير: b. en 2016\nالقاعدة العامة: الفعل Vimos ماضي بسيط يتطلب تحديد سنة منتهية en 2016.\nمثال: Vimos esa película en 2016.", es:"Vimos esa película sobre deportes en 2016."},
  q7_6:{ar:"تحديد التعبير: a. este mes\nالقاعدة العامة: الفعل Hemos visto ماضي قريب يتطلب ظرف مستمر مثل este mes.\nمثال: Este mes hemos visto muchas películas.", es:"Hemos visto muchas películas este mes."},
  q7_7:{ar:"تحديد التعبير: a. ayer\nالقاعدة العامة: الفعل cocinaron ماضي بسيط يتماشى مع أمس (ayer).\nمثال: Los chicos cocinaron la paella ayer.", es:"Cocinaron la paella ayer."},
  q7_8:{ar:"تحديد التعبير: b. hoy\nالقاعدة العامة: الفعل han cocinado ماضي قريب يتماشى مع اليوم (hoy).\nمثال: Los chicos han cocinado hoy.", es:"Han cocinado la paella hoy."},

  q8_1:{ar:"تحديد الفعل: ir\nالقاعدة العامة: في جملة ¿Fuiste a clase ayer؟ السؤال عن الذهاب إلى الصف (الفعل ir).\nمثال: ¿Fuiste al cine?", es:"¿Fuiste a clase ayer?"},
  q8_2:{ar:"تحديد الفعل: ser\nالقاعدة العامة: في جملة fue un año muy especial، تقييم ووصف كيف كان العام (الفعل ser).\nمثال: Fue una fiesta increíble.", es:"El 2017 fue un año muy especial."},
  q8_3:{ar:"تحديد الفعل: ir\nالقاعدة العامة: في السؤال ¿Cuándo fuiste a la fiesta؟ السؤال عن موعد الذهاب إلى الحفلة (ir).\nمثال: ¿Cuándo fuiste a Madrid?", es:"¿Cuándo fuiste a la fiesta?"},
  q8_4:{ar:"تحديد الفعل: ir\nالقاعدة العامة: في جملة fuimos a pie a la estación، التعبير عن الذهاب مشياً (ir).\nمثال: Fuimos a la playa en autobús.", es:"Nosotros fuimos a pie."},
  q8_5:{ar:"تحديد الفعل: ser\nالقاعدة العامة: في جملة fue un escultor muy famoso، التعريف بمهنة شخص في الماضي (ser).\nمثال: Mi padre fue médico.", es:"Mi abuelo fue un escultor famoso."},
  q8_6:{ar:"تحديد الفعل: ser\nالقاعدة العامة: في جملة La conferencia fue muy interesante، وصف المحاضرة بأنها شيقة (ser).\nمثال: La clase fue excelente.", es:"La conferencia de ayer fue muy interesante."},
  q8_7:{ar:"تحديد الفعل: ser\nالقاعدة العامة: في السؤال ¿Quién fue el presidente؟ السؤال عن هوية شخص في منصب سابق (ser).\nمثال: ¿Quién fue el director?", es:"¿Quién fue el presidente de tu país?"},
  q8_8:{ar:"تحديد الفعل: ser\nالقاعدة العامة: في جملة Esos fueron los mejores años، تقييم تلك السنوات (ser).\nمثال: Fueron días bonitos.", es:"Esos fueron los mejores años de su vida."},

  q9_1:{ar:"تحديد الكلمة: tuvimos\nالقاعدة العامة: ظرف الزمان la semana pasada منتهي، فيتطلب الماضي البسيط tuvimos.\nمثال: La semana pasada tuvimos una reunión.", es:"La semana pasada tuvimos la reunión."},
  q9_2:{ar:"تحديد الكلمة: Tuvo\nالقاعدة العامة: تكملة سرد القصة في الماضي البسيط، التعبير tener lugar (ينعقد) في الماضي البسيط هو tuvo lugar.\nمثال: El evento tuvo lugar en Madrid.", es:"Tuvo lugar en una finca abandonada."},
  q9_3:{ar:"تحديد الكلمة: he estado\nالقاعدة العامة: وجود كلمة Ya (بالفعل) يدل على تجربة في الحياة مرتبطة بالحاضر، فنستخدم الماضي القريب he estado.\nمثال: Yo ya he estado en esa playa.", es:"Yo ya he estado en tres fiestas allí."},
  q9_4:{ar:"تحديد الكلمة: pude\nالقاعدة العامة: سرد أحداث وقعت أثناء الحفلة المنتهية (Durante la reunión)، فيتطلب الماضي البسيط pude.\nمثال: Durante la fiesta pude hablar con todos.", es:"Durante la reunión pude ver a los compañeros."},
  q9_5:{ar:"تحديد الكلمة: hemos visto\nالقاعدة العامة: وجود كلمة مؤخراً (Últimamente) يدل على استمرارية الحدث للوقت الحاضر، فنستخدم الماضي القريب.\nمثال: Últimamente no hemos visto a Juan.", es:"Últimamente no nos hemos visto."},
  q9_6:{ar:"تحديد الكلمة: se casó\nالقاعدة العامة: ظرف الزمان el año pasado منتهي، فنستخدم الماضي البسيط se casó.\nمثال: Marisa se casó en 2020.", es:"Marisa se casó el año pasado."},
  q9_7:{ar:"تحديد الكلمة: se fue\nالقاعدة العامة: عطف وتكملة على فعل الماضي البسيط السابق، ذهبت للعيش في كندا se fue.\nمثال: Se fue a vivir a Italia.", es:"Se fue a vivir a Canadá."},
  q9_8:{ar:"تحديد الكلمة: participó\nالقاعدة العامة: ظرف الزمان Hace un año منتهي، فنستخدم الماضي البسيط participó.\nمثال: Hace un año participó en un torneo.", es:"Hace un año Andrea participó en tres proyectos."},
  q9_9:{ar:"تحديد الكلمة: se marchó\nالقاعدة العامة: عطف وتكملة على أحداث الماضي البسيط، انتقلت إلى واشنطن se marchó.\nمثال: Se marchó a Francia.", es:"Se marchó a Washington."},
  q9_10:{ar:"تحديد الكلمة: ha expuesto\nالقاعدة العامة: استخدام Ya للتعبير عن إنجاز مهني في مسيرة الفنان دون تحديد وقت منتهي.\nمثال: Ya ha expuesto en París.", es:"Ya ha expuesto sus trabajos en el extranjero."},
  q9_11:{ar:"تحديد الكلمة: ha ganado\nالقاعدة العامة: ظرف الزمان este mes جاري وغير منتهي، فيتطلب الماضي القريب ha ganado.\nمثال: Este mes ha ganado un trofeo.", es:"Este mes ha ganado un premio muy importante."},
  q9_12:{ar:"تحديد الكلمة: regresé\nالقاعدة العامة: ظرف الزمان hace dos años منتهي ومحدد، فنستخدم الماضي البسيط regresé.\nمثال: Hace dos años regresé de Lima.", es:"Hace dos años regresé de Italia."},
  q9_13:{ar:"تحديد الكلمة: estudié\nالقاعدة العامة: تكملة سرد أحداث الماضي البسيط حيث درستُ العمارة estudié.\nمثال: Estudié Medicina en Madrid.", es:"Donde estudié Arquitectura."},

  q10_1:{ar:"تحديد الصفة: ¡Fue horrible!\nالقاعدة العامة: نستخدم فعل ser في الماضي البسيط (fue) مع صفة سلبية مثل horrible لوصف التعرض للسرقة في عطلة منتهية.\nمثال: Entraron a robar. ¡Fue horrible!", es:"Entraron a robar. ¡Fue horrible!"},
  q10_2:{ar:"تحديد الصفة: ¡Ha sido muy desagradable!\nالقاعدة العامة: نستخدم الماضي القريب (ha sido) لأن الحوار يبدأ بـ اليوم (Hoy)، والطقس البارد جداً يجعل المشي غير سار (desagradable).\nمثال: Hoy hace frío. ¡Ha sido muy desagradable!", es:"No ha sido una buena idea. ¡Ha sido muy desagradable!"},
  q10_3:{ar:"تحديد الصفة: ¡Fue fantástico!\nالقاعدة العامة: وصف رحلة الصيف الماضي المنتهية إلى بيرو، وإعجابهم بكل شيء يجعلها تجربة رائعة (fantástico).\nمثال: Nos gustó todo. ¡Fue fantástico!", es:"En realidad nos gustó todo. ¡Fue fantástico!"},
  q10_4:{ar:"تحديد الصفة: ¡Ha sido muy bonito!\nالقاعدة العامة: الحوار عن صباح اليوم (esta mañana)، وتأثر الشخص بهدية الوداع يجعل الموقف جميلاً (bonito).\nمثال: Se ha emocionado. ¡Ha sido muy bonito!", es:"Se ha emocionado mucho. ¡Ha sido muy bonito!"},
  q10_5:{ar:"تحديد الصفة: ¡Fue muy divertido!\nالقاعدة العامة: وصف الذهاب للسينما مساء أمس (Ayer)، والضحك طوال الوقت يجعل الفيلم ممتعاً ومضحكاً (divertido).\nمثال: Nos reímos todo el tiempo. ¡Fue muy divertido!", es:"Nos reímos todo el tiempo. ¡Fue muy divertido!"},

  q12_1:{ar:"تحديد التعبير: el acontecimiento especial\nالقاعدة العامة: كلمة acontecimiento تعني حدث، وتوصف بـ especial (خاص أو متميز).\nمثال: Fue un acontecimiento especial.", es:"El acontecimiento especial."},
  q12_2:{ar:"تحديد التعبير: la beca de estudios\nالقاعدة العامة: كلمة beca تعني منحة، وتأتي مع de estudios (منحة دراسية).\nمثال: Ganó una beca de estudios.", es:"La beca de estudios."},
  q12_3:{ar:"تحديد التعبير: el campeonato deportivo/-a\nالقاعدة العامة: كلمة campeonato تعني بطولة، وتوصف بـ deportivo (بطولة رياضية).\nمثال: Un campeonato deportivo.", es:"El campeonato deportivo."},
  q12_4:{ar:"تحديد التعبير: la celebración del cumpleaños\nالقاعدة العامة: كلمة celebración تعني احتفال، وتأتي مع del cumpleaños (احتفال عيد الميلاد).\nمثال: La celebración del cumpleaños.", es:"La celebración del cumpleaños."},
  q12_5:{ar:"تحديد التعبير: la medalla de oro\nالقاعدة العامة: كلمة medalla تعني ميدالية، وتوصف بـ de oro (ميدالية ذهبية).\nمثال: Ganó la medalla de oro.", es:"La medalla de oro."},
  q12_6:{ar:"تحديد التعبير: la misión espacial\nالقاعدة العامة: كلمة misión تعني مهمة، وتوصف بـ espacial (مهمة فضائية في وكالة ناسا).\nمثال: Una misión espacial importante.", es:"La misión espacial."},
  q12_7:{ar:"تحديد التعبير: la publicación de una novela\nالقاعدة العامة: كلمة publicación تعني نشر، وتأتي مع de una novela (نشر رواية أدبية).\nمثال: La publicación de su nueva novela.", es:"La publicación de una novela."},
  q12_8:{ar:"تحديد التعبير: el concierto al aire libre\nالقاعدة العامة: كلمة concierto تعني حفلة موسيقية، وتأتي مع al aire libre (في الهواء الطلق).\nمثال: Un concierto al aire libre en el parque.", es:"El concierto al aire libre."},
  q12_9:{ar:"تحديد التعبير: la fiesta popular\nالقاعدة العامة: كلمة fiesta تعني مهرجان أو حفلة، وتوصف بـ popular (شعبية أو جماهيرية).\nمثال: Una fiesta popular en el barrio.", es:"La fiesta popular."},

  q13_1:{ar:"تحديد الاسم: el viaje\nالقاعدة العامة: الاسم المشتق من الفعل viajar هو el viaje (الرحلة أو السفر).\nمثال: El viaje fue largo.", es:"Viajar ↔ el viaje."},
  q13_2:{ar:"تحديد الفعل: celebrar\nالقاعدة العامة: الفعل المشتق من الاسم la celebración هو celebrar (يحتفل).\nمثال: Vamos a celebrar tu éxito.", es:"La celebración ↔ celebrar."},
  q13_3:{ar:"تحديد الاسم: el sueño\nالقاعدة العامة: الاسم المشتق من الفعل soñar هو el sueño (الحلم).\nمثال: Tengo el sueño de visitar Machu Picchu.", es:"Soñar ↔ el sueño."},
  q13_4:{ar:"تحديد الفعل: volar\nالقاعدة العامة: الفعل المشتق من الاسم el vuelo هو volar (يطير).\nمثال: Me gusta volar en avión.", es:"El vuelo ↔ volar."},
  q13_5:{ar:"تحديد الاسم: el contrato\nالقاعدة العامة: الاسم المشتق من الفعل contratar هو el contrato (العقد المهني).\nمثال: Firmé el contrato de trabajo.", es:"El contrato ↔ contratar."},
  q13_6:{ar:"تحديد الفعل: cambiar\nالقاعدة العامة: الفعل المشتق من الاسم el cambio هو cambiar (يغير أو يتبدل).\nمثال: Tienes que cambiar de idea.", es:"El cambio ↔ cambiar."},
  q13_7:{ar:"تحديد الاسم: la manifestación\nالقاعدة العامة: الاسم المشتق من الفعل المنعكس manifestarse هو la manifestación (المظاهرة).\nمثال: Participaron en una manifestación.", es:"La manifestación ↔ manifestarse."},
  q13_8:{ar:"تحديد الفعل: publicar\nالقاعدة العامة: الفعل المشتق من الاسم la publicación هو publicar (ينشر).\nمثال: Van a publicar el artículo.", es:"La publicación ↔ publicar."},

  q15a_1:{ar:"تحديد الكلمة: maestra\nالقاعدة العامة: كلمة ma-es-tra تتكون من حرفين قويين متتاليين (a و e)، لذلك يُنطقان في مقطعين منفصلين.\nمثال: ma-es-tra.", es:"ma - es - tra."},
  q15a_2:{ar:"تحديد الكلمة: línea\nالقاعدة العامة: كلمة lí-ne-a تحتوي على حرفين قويين متتاليين (e و a)، فيتم فصلهما إلى مقطعين.\nمثال: lí-ne-a.", es:"lí - ne - a."},
  q15a_3:{ar:"تحديد الكلمة: viaje\nالقاعدة العامة: كلمة via-je تحتوي على حرف ضعيف غير منبور (i) متبوع بحرف قوي (a)، فيندمجان في مقطع واحد (Diptongo).\nمثال: via-je.", es:"via - je."},
  q15a_4:{ar:"تحديد الكلمة: vuestro\nالقاعدة العامة: كلمة vues-tro تحتوي على حرف ضعيف غير منبور (u) مدمج مع حرف قوي (e) في مقطع واحد.\nمثال: vues-tro.", es:"vues - tro."},
  q15a_5:{ar:"تحديد الكلمة: río\nالقاعدة العامة: كلمة rí-o تحتوي على حرف ضعيف منبور عليه تيلدي (í) متبوع بحرف قوي، فتكسر التيلدي الدمج ويفصلان.\nمثال: rí-o.", es:"rí - o."},
  q15a_6:{ar:"تحديد الكلمة: día\nالقاعدة العامة: كلمة dí-a فيها حرف ضعيف منبور عليه تيلدي (í) يفصله عن الحرف القوي a.\nمثال: dí-a.", es:"dí - a."},

  q15_1:{ar:"تحديد المقاطع: fa-mi-lia\nالقاعدة العامة: المقطع الأخير -lia يحتوي على دمج (Diptongo) بين الحرف الضعيف i والقوي a دون تيلدي، فيشكلان مقطعاً واحداً.\nمثال: fa-mi-lia (3 مقاطع).", es:"fa-mi-lia"},
  q15_2:{ar:"تحديد المقاطع: nues-tro\nالقاعدة العامة: المقطع الأول nues- يدمج الحرف الضعيف u مع الحرف القوي e في مقطع واحد.\nمثال: nues-tro (مقطعان).", es:"nues-tro"},
  q15_3:{ar:"تحديد المقاطع: far-ma-cia\nالقاعدة العامة: المقطع الأخير -cia يدمج i مع a في مقطع واحد.\nمثال: far-ma-cia (3 مقاطع).", es:"far-ma-cia"},
  q15_4:{ar:"تحديد المقاطع: re-al\nالقاعدة العامة: توالي حرفين قويين e و a يتطلب فصلهما في النطق والكتابة.\nمثال: re-al (مقطعان).", es:"re-al"},
  q15_5:{ar:"تحديد المقاطع: es-tu-dian-tes\nالقاعدة العامة: المقطع -dian- يحتوي على دمج بين i و a في مقطع واحد.\nمثال: es-tu-dian-tes (4 مقاطع).", es:"es-tu-dian-tes"},
  q15_6:{ar:"تحديد المقاطع: cre-o\nالقاعدة العامة: توالي حرفين قويين e و o يتطلب فصلهما إلى مقطعين منفصلين.\nمثال: cre-o (مقطعان).", es:"cre-o"},
  q15_7:{ar:"تحديد المقاطع: en-ví-o\nالقاعدة العامة: وضع الكسرة (Tilde) على الحرف الضعيف í يمنع الدمج مع الحرف القوي o، فيفصلان.\nمثال: en-ví-o (3 مقاطع).", es:"en-ví-o"},
  q15_8:{ar:"تحديد المقاطع: len-gua\nالقاعدة العامة: المقطع -gua يدمج u مع a في مقطع واحد.\nمثال: len-gua (مقطعان).", es:"len-gua"},
  q15_9:{ar:"تحديد المقاطع: com-pa-ñí-a\nالقاعدة العامة: التيلدي على í تفصل الحرف الضعيف عن الحرف القوي a.\nمثال: com-pa-ñí-a (4 مقاطع).", es:"com-pa-ñí-a"},

  q15_10:{ar:"تحديد الكلمات: real, creo\nالقاعدة العامة: هذه الكلمات تنطبق عليها القاعدة رقم 1 (توالي حرفين متحركين قويين يُنطقان في مقطعين منفصلين re-al و cre-o).\nمثال: Regla 1.", es:"real, creo."},
  q15_11:{ar:"تحديد الكلمات: familia, nuestro, farmacia, estudiantes, lengua\nالقاعدة العامة: تنطبق عليها القاعدة رقم 2 (الدمج الصوتي Diptongo بين حرف قوي وحرف ضعيف غير منبور يشكلان مقطعاً واحداً).\nمثال: Regla 2.", es:"familia, nuestro, farmacia, estudiantes, lengua."},
  q15_12:{ar:"تحديد الكلمات: guía, envío, compañía\nالقاعدة العامة: تنطبق عليها القاعدة رقم 3 (حرف ضعيف منبور عليه تيلدي يرافقه حرف قوي، فيفصلان إلى مقطعين).\nمثال: Regla 3.", es:"guía, envío, compañía."}

function buildSelect(id, optKey) {
    let opts = '<option value="">-- اختر --</option>';
    let items = [];
    if (typeof SELECT_OPTIONS !== 'undefined' && SELECT_OPTIONS[optKey]) {
        items = SELECT_OPTIONS[optKey];
    } else if (Array.isArray(optKey)) {
        items = optKey.map(x => typeof x === 'object' ? x : {v: x, t: x});
    }
    items.forEach(o => opts += `<option value="${o.v}">${o.t}</option>`);
    return `<select id="${id}" class="select-mcq">${opts}</select><div class="feedback" style="display:inline-block;margin-left:4px" id="fb${id.substring(1)}"></div>`;
}
function buildInput(id, ph) { return `<input type="text" id="${id}" placeholder="${ph||''}"><div class="feedback" id="fb${id.substring(1)}"></div>`; }
function buildTextarea(id, ph) { return `<textarea id="${id}" placeholder="${ph||''}"></textarea><div class="feedback" id="fb${id.substring(1)}"></div>`; }
function buildAudio(p) { return `<div class="audio-card"><div class="audio-icon">🎧</div><div class="audio-info"><div class="audio-label">Pista ${p}</div><audio controls preload="none"><source src="${AUDIO_BASE}${String(p).padStart(2,'0')}%20Pista%20${p}.mp3" type="audio/mpeg"></audio></div></div>`; }
function buildWordBank(w) { return `<div class="word-bank">${w.map(x=>`<span>${x}</span>`).join('')}</div>`; }
function buildOptionsList(o) { return `<div class="options-list">${o.map(x=>`<span class="opt">${x}</span>`).join('')}</div>`; }
function buildTranscriptBtn(k) {
    const tr = TRANSCRIPTIONS[k];
    if (!tr) return '';
    return `<button class="transcript-btn" id="trBtn_${k}" onclick="openTranscript('${k}')" disabled><span class="lock-icon">🔒</span><span>📝 عرض النص (Transcripción)</span><span class="progress-text" id="trProg_${k}">0/${tr.requiredQuestions.length}</span></button>`;
}
function buildQuestion(q) {
    let h = '';
    if (q.label) h = `<div class="q-label">${q.label}</div>`;
    else if (q.n !== undefined && q.n !== '') h = `<div class="q-label"><span class="num-bullet">${q.n}</span></div>`;
    if (q.text) h += `<div class="q-text">${q.text}</div>`;
    if (q.sel) h += buildSelect(q.id, q.sel);
    else if (q.input) h += buildInput(q.id, q.placeholder);
    else if (q.textarea) h += buildTextarea(q.id, q.placeholder);
    let fbNeeded = true;
    if (q.text && q.text.includes('feedback')) fbNeeded = false;
    if (fbNeeded && q.id && !q.sel && !q.input && !q.textarea) {
        h += `<div class="feedback" id="fb${q.id.substring(1)}"></div>`;
    }
    return `<div class="question-card">${h}</div>`;
}

    if (s.hint) body += `<div class="hint-box">${s.hint}</div>`;

    else if (s.custom==='slide5') body += buildSlide5();
    else if (s.custom==='slide6') body += buildSlide6();
    else if (s.custom==='slide7') body += buildSlide7();
    else if (s.custom==='slide8') body += buildSlide8();
    else if (s.custom==='slide9') body += buildSlide9();
    else if (s.custom==='slide10') body += buildSlide10();
    else if (s.custom==='slide11') body += buildSlide11();
    else if (s.custom==='slide12') body += buildSlide12();
    else if (s.custom==='slide13') body += buildSlide13();
    else if (s.custom==='slide14') body += buildSlide14();
    else if (s.custom==='slide15') body += buildSlide15();

function initSlider() {
    const slides = document.querySelectorAll('.slide');
    totalSlides = slides.length;
    document.getElementById('totalSlidesNum').textContent = totalSlides;
    const jc = document.getElementById('slideJumpButtons');
    jc.innerHTML = '';
    for (let i=0; i<totalSlides; i++) {
        const btn = document.createElement('button');
        btn.className = 'jump-btn'; btn.textContent = i+1;
        btn.onclick = () => goToSlide(i); btn.id = 'jumpBtn_'+i;
        jc.appendChild(btn);
    }
    if (slides.length > 0) slides[0].classList.add('active');
    updateSlider();
}
function goToSlide(i) {
    if (i<0 || i>=totalSlides) return;
    document.querySelectorAll('audio').forEach(a => { try{a.pause();}catch(e){} });
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.slide')[i].classList.add('active');
    currentSlide = i;
    updateSlider();
    window.scrollTo({top:0,behavior:'smooth'});
}
function nextSlide() { if (currentSlide < totalSlides-1) goToSlide(currentSlide+1); }
function prevSlide() { if (currentSlide > 0) goToSlide(currentSlide-1); }
function updateSlider() {
    document.getElementById('currentSlideNum').textContent = currentSlide+1;
    document.getElementById('slideProgressFill').style.width = ((currentSlide+1)/totalSlides*100)+'%';
    document.getElementById('prevBtn').disabled = currentSlide===0;
    document.getElementById('nextBtn').disabled = currentSlide===totalSlides-1;
    for (let i=0; i<totalSlides; i++) {
        const btn = document.getElementById('jumpBtn_'+i);
        if (btn) btn.classList.toggle('active', i===currentSlide);
    }
    updateJumpButtonStatus();
}
function updateJumpButtonStatus() {
    document.querySelectorAll('.slide').forEach((slide,i) => {
        const btn = document.getElementById('jumpBtn_'+i);
        if (!btn) return;
        const inputs = slide.querySelectorAll('input, select, textarea');
        let total=0, locked=0, pending=0;
        inputs.forEach(el => {
            if (!el.id || !el.id.startsWith('q')) return;
            total++;
            if (lockedAnswers[el.id]) {
                if (lockedAnswers[el.id].status==='pending') pending++;
                else locked++;
            }
        });
        btn.classList.remove('completed','has-pending');
        if (pending > 0) btn.classList.add('has-pending');
        else if (total > 0 && locked >= total) btn.classList.add('completed');
    });
}
document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    if (e.key==='ArrowLeft') nextSlide();
    if (e.key==='ArrowRight') prevSlide();
});

function normalize(s) { return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/\./g,'').replace(/,$/g,'').replace(/¿/g,'').replace(/¡/g,'').replace(/→/g,'').replace(/\u00a0/g,' '); }
function gradeAutoQuestion(qId, value) {
    const m = AUTO_GRADED[qId];
    if (!m) return null;
    const ua = String(value||'').trim(); if (!ua) return null;
    let ok = false;
    if (m.t === 'select') ok = m.a.some(x => String(x).toLowerCase() === ua.toLowerCase());
    else ok = m.a.some(x => normalize(x) === normalize(ua));
    return { isCorrect:ok, correctAnswer: m.d || m.a[0] };
}

function lockField(el) {
    if (!el) return;
    el.disabled = true;
    el.readOnly = true; el.setAttribute('data-locked','true');
    el.addEventListener('input', preventEdit);
    el.addEventListener('beforeinput', preventEdit);
    el.addEventListener('paste', preventEdit);
    el.addEventListener('cut', preventEdit);
    el.addEventListener('keydown', preventEditKey);
}
function preventEdit(e) { if (e.target.getAttribute('data-locked')==='true') { e.preventDefault(); return false; } }
function preventEditKey(e) {
    if (e.target.getAttribute('data-locked')==='true') {
        const allowed = ['Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','PageUp','PageDown'];
        if (allowed.includes(e.key)) return;
        if (e.ctrlKey && (e.key==='c' || e.key==='a')) return;
        e.preventDefault(); return false;
    }
}

function formatArabicExplanation(text) {
    if (!text) return '';
    const lines = String(text).split('\n');
    return lines.map(line => {
        if (!line.trim()) return '';
        const formatted = line.replace(/([a-zA-ZáéíóúñÁÉÍÓÚÑüÜ¿¡]+[a-zA-ZáéíóúñÁÉÍÓÚÑüÜ0-9¿¡?!.,\s\-–—]*)/g, match => {
            const t = match.trim();
            if (!t || /^[0-9.,\s\-–—]+$/.test(t)) return match;
            return ` <span class="es-inline-box" dir="ltr">${t}</span> `;
        });
        return `<div class="exp-line" dir="rtl">${formatted}</div>`;
    }).join('');
}

function buildExplanationHTML(exp) {
    if (!exp) return '';
    let text = typeof exp === 'string' ? exp : (exp.ar || exp.rule || '');
    let esText = typeof exp === 'object' ? (exp.es || exp.example || '') : '';
    let html = `<div style="margin-bottom:8px">💡 <strong>الشرح والقاعدة:</strong><br>${formatArabicExplanation(text)}</div>`;
    if (esText) html += `<div class="es-line" dir="ltr" style="direction:ltr;text-align:left;background:rgba(0,0,0,0.35);padding:8px 14px;border-radius:10px;border-left:4px solid #2ecc71;margin-top:8px;color:#2ecc71;font-weight:700;">📝 ${esc(esText)}</div>`;
    return html;
}

    if (info.status === 'pending') {
        el.classList.add('locked-pending');
        fb.className = 'feedback pending';
        let html = `<div class="fb-spanish"><span class="lock-badge pending">⏳ Pendiente</span><br><strong>📝 Tu respuesta:</strong> ${esc(info.value)}</div><div class="fb-arabic"><strong>⏳ بانتظار تصحيح المدرس</strong><br>تم استلام إجابتك.`;
        if (info.rule) html += `<br>💡 <strong>القاعدة:</strong> ${esc(info.rule)}`;
        if (info.expectedAnswer) html += `<span class="es-line">📝 ${esc(info.expectedAnswer)}</span>`;
        html += `</div>`;
        fb.innerHTML = html;
    } else if (info.isHalf || info.verdict==='half') {
        el.classList.add('locked-half');
        fb.className = 'feedback half';
        let html = `<div class="fb-spanish"><span class="lock-badge half">⚠️ 0.5</span><strong>📝 Tu respuesta:</strong> ${esc(info.value)}<br>`;
        if (info.expectedAnswer) html += `<strong>✅ Respuesta modelo:</strong> ${esc(info.expectedAnswer)}`;
        html += `</div><div class="fb-arabic"><strong>⚠️ نص درجة (0.5)</strong>`;
        if (info.feedback && info.feedback !== '⚠️ إجابة شبه صحيحة - نصف درجة') html += `<div class="teacher-comment"><strong>💬 المدرس:</strong> ${esc(info.feedback)}</div>`;
        if (info.rule) html += `<br>💡 ${esc(info.rule)}`;
        if (info.reviewedBy) html += `<span class="reviewed-by">✏️ صححها: ${esc(info.reviewedBy)}</span>`;
        html += `</div>`;
        fb.innerHTML = html;
    } else if (info.isCorrect) {
        el.classList.add('locked-correct');
        fb.className = 'feedback correct';
        let html = `<div class="fb-spanish"><span class="lock-badge">✅ ¡Correcto!</span><strong>📝 Tu respuesta:</strong> ${esc(info.value)}</div>`;

            html += `<div class="fb-arabic">`;
            if (exp) html += buildExplanationHTML(exp);

            html += `</div>`;
        }
        fb.innerHTML = html;
    } else {
        el.classList.add('locked-wrong');
        fb.className = 'feedback wrong';
        const m = AUTO_GRADED[qId];

        let html = `<div class="fb-spanish"><span class="lock-badge wrong">❌ Incorrecto</span><strong>📝 Tu respuesta:</strong> ${esc(info.value)}<br>`;
        if (cd) html += `<strong>✅ Respuesta correcta:</strong> ${esc(cd)}`;
        html += `</div><div class="fb-arabic">`;
        if (exp) html += buildExplanationHTML(exp);
        else if (info.rule) html += `💡 <strong>القاعدة:</strong> ${esc(info.rule)}`;
        if (info.feedback && info.feedback !== '❌ إجابة غير صحيحة') html += `<div class="teacher-comment"><strong>💬 المدرس:</strong> ${esc(info.feedback)}</div>`;
        if (info.reviewedBy) html += `<span class="reviewed-by">✏️ صححها: ${esc(info.reviewedBy)}</span>`;
        html += `</div>`;
        fb.innerHTML = html;
    }
}

async function sendDataViaGET(data) {
    const ds = JSON.stringify(data);
    if (ds.length > 7000) return sendDataViaForm(data);
    const url = SCRIPT_URL + '?action=saveProgress&data=' + encodeURIComponent(ds);
    try { await fetch(url, {mode:'no-cors'}); return {success:'unknown'}; } catch(e) { throw e; }
}
function sendDataViaForm(data) {
    return new Promise((res,rej) => {
        const ifn = 'sub_'+Date.now();
        const iframe = document.createElement('iframe');
        iframe.name = ifn; iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method='POST'; form.action=SCRIPT_URL; form.target=ifn; form.style.display='none';
        const pi = document.createElement('input');
        pi.type='hidden'; pi.name='data'; pi.value=JSON.stringify(data); form.appendChild(pi);
        const ai = document.createElement('input');
        ai.type='hidden'; ai.name='action'; ai.value=data.action || 'saveProgress'; form.appendChild(ai);
        document.body.appendChild(form);
        let r=false;
        const to = setTimeout(()=>{if(!r){r=true;cu();res({success:'unknown'});}}, 5000);
        const cu = () => { try{document.body.removeChild(form);}catch(e){} setTimeout(()=>{try{document.body.removeChild(iframe);}catch(e){}}, 500); };
        iframe.onload = ()=>{if(!r){r=true;clearTimeout(to);cu();res({success:'unknown'});}};
        iframe.onerror = ()=>{if(!r){r=true;clearTimeout(to);cu();rej(new Error('Form failed'));}};
        try{form.submit();}catch(e){r=true;clearTimeout(to);cu();rej(e);}
    });
}
async function sendAndVerify(data) {
    try { await sendDataViaGET(data); } catch(e) {}
    await new Promise(r => setTimeout(r, 1200));
    try {
        const url = SCRIPT_URL + '?action=getProgress&username=' + encodeURIComponent(data.username) + '&lessonId=' + encodeURIComponent(data.lessonId) + '&_t=' + Date.now();
        const r = await fetch(url); const res = await r.json();
        if (res.status === 'success') {
            const sA = parseInt(res.totalAnswered) || 0;
            const sP = parseInt(res.totalPending) || 0;
            if (sA + sP >= data.totalAnswered + data.totalPending) return {verified:true};
            return {verified:true, offline:true};
        }
    } catch(e) { return {verified:true, offline:true}; }
    return {verified:true, offline:true};
}
async function fetchWithRetry(url, opts={}, max=3) {
    let lastErr;
    for (let i=0; i<max; i++) {
        try { return await fetch(url, opts); }
        catch(e) { lastErr=e; if (i<max-1) await new Promise(r=>setTimeout(r,1000*(i+1))); }
    }
    throw lastErr;
}
async function loadProgress() {
    try {
        const url = SCRIPT_URL + '?action=getProgress&username=' + encodeURIComponent(currentUser.username) + '&lessonId=' + encodeURIComponent(LESSON_CONFIG.lessonId) + '&_t=' + Date.now();
        const r = await fetchWithRetry(url); const res = await r.json();
        if (res.status === 'success') {
            totalCorrect = parseFloat(res.totalCorrect) || 0;
            totalWrong = parseInt(res.totalWrong) || 0;
            totalAnswered = parseInt(res.totalAnswered) || 0;
            totalPending = parseInt(res.totalPending) || 0;
            totalHalf = parseInt(res.totalHalf) || 0;
            if (res.lockedAnswers && res.lockedAnswers !== '{}') {
                try {
                    lockedAnswers = JSON.parse(res.lockedAnswers);
                    Object.keys(lockedAnswers).forEach(qId => displayLockedAnswer(qId, lockedAnswers[qId]));
                } catch(e){}
            }
            updateProgressDisplay();
            updateJumpButtonStatus();
            if (!isTeacherGradingMode) checkIfComplete();
            checkAllTranscripts();
        }
    } catch(e) { console.error(e); }
}

function prepareSubmit() {

        showPopup({type:'warning',icon:'⚠️',title:'لا توجد إجابات جديدة',body:'لم تحل أي سؤال جديد. الرجاء حل بعض الأسئلة أولاً.',buttons:[{text:'حسناً',class:'primary'}]});
        return;
    }
    pendingSubmit = na;
    let ac=0, tc=0;
    na.forEach(a => { if (AUTO_GRADED[a.id]) ac++; else tc++; });
    showPopup({
        type:'warning', icon:'🤔', title:'تأكيد الإرسال',
        body:`<p>هل أنت متأكد من إرسال إجاباتك؟</p><div class="popup-detail">📊 <strong>عدد الإجابات:</strong> ${na.length}<br>🤖 تصحيح فوري: <strong>${ac}</strong><br>👨‍🏫 يصححها المدرس: <strong>${tc}</strong><br>⚠️ لن تتمكن من تعديل الإجابات بعد الإرسال!</div>`,
        buttons:[{text:'✅ نعم، أرسل',class:'primary',action:confirmSubmit},{text:'❌ إلغاء',class:'secondary',action:()=>{pendingSubmit=null;closePopup();}}]
    });
}
async function confirmSubmit() {
    closePopup();
    if (!pendingSubmit) return;
    const na = pendingSubmit; pendingSubmit = null;
    showLoading('⏳ جاري التصحيح والإرسال...', na.length+' سؤال');
    let bc=0, bw=0, bp=0;
    const fr = [];
    const usedGroupVals = new Set();
    na.forEach(ans => {
        if (AUTO_GRADED[ans.id]) {
            const m = AUTO_GRADED[ans.id];
            let r = gradeAutoQuestion(ans.id, ans.value);
            if (m && m.group && r && r.isCorrect) {
                const nv = normalize(ans.value);
                const gkey = m.group + '_' + nv;
                if (usedGroupVals.has(gkey)) {
                    r = { isCorrect: false, correctAnswer: m.d + ' (فعل مكرر في الجدول)' };
                } else {
                    usedGroupVals.add(gkey);
                }
            }
            fr.push({id:ans.id, value:ans.value, status:'reviewed', isCorrect:r.isCorrect});
            if (r.isCorrect) bc++; else bw++;
        } else {
            const ctx = TEACHER_GRADED_CONTEXT[ans.id] || {};
            fr.push({id:ans.id, value:ans.value, status:'pending', isCorrect:false, feedback:'بانتظار تصحيح المدرس', questionText:ctx.questionText || ans.id, expectedAnswer:ctx.expectedAnswer || '', rule:ctx.rule || ''});
            bp++;
        }
    });
    const tl = JSON.parse(JSON.stringify(lockedAnswers));
    const nao = {};
    fr.forEach(r => {
        const o = {value:r.value, status:r.status, isCorrect:r.isCorrect};
        if (r.feedback) o.feedback = r.feedback;
        if (r.status==='pending') { o.questionText=r.questionText; o.expectedAnswer=r.expectedAnswer; o.rule=r.rule; }
        tl[r.id] = o; nao[r.id] = o;
    });
    const ntc = totalCorrect + bc;
    const ntw = totalWrong + bw;
    const nta = totalAnswered + (bc + bw);
    const ntp = totalPending + bp;
    const data = {
        action:'saveProgress', username:currentUser.username, fullName:currentUser.fullName,
        lessonId:LESSON_CONFIG.lessonId, lessonName:LESSON_CONFIG.lessonName,
        totalCorrect:ntc, totalWrong:ntw, totalAnswered:nta, totalPending:ntp, totalQuestions:LESSON_CONFIG.totalQuestions,
        batchCorrect:bc, batchWrong:bw, batchAnswered:bc+bw, batchPending:bp,
        details:`${na.length} سؤال | صح ${bc} | خطأ ${bw} | بانتظار ${bp}`,
        newAnswers:JSON.stringify(nao)
    };
    const r = await sendAndVerify(data);
    hideLoading();
    if (r.verified) {
        lockedAnswers = tl;
        totalCorrect=ntc; totalWrong=ntw; totalAnswered=nta; totalPending=ntp;
        fr.forEach(x => displayLockedAnswer(x.id, x));
        document.getElementById('retryBanner').style.display = 'none';
        lastFailedData = null;
        safeStorage.removeItem('ia_pending_'+LESSON_CONFIG.lessonId);
        updateProgressDisplay();
        updateJumpButtonStatus();
        checkAllTranscripts();
        showPopup({
            type:'success', icon:'✅', title:'تم الإرسال بنجاح!',
            body:`<div class="popup-detail">✅ صح: <strong style="color:#2ecc71">${bc}</strong><br>❌ خطأ: <strong style="color:#e74c3c">${bw}</strong><br>⏳ بانتظار المدرس: <strong style="color:#9b59b6">${bp}</strong></div>`,
            buttons:[{text:'👍 حسناً',class:'primary',action:()=>{closePopup();checkIfComplete();}}]
        });
    } else {
        lastFailedData = data;
        try { safeStorage.setItem('ia_pending_'+LESSON_CONFIG.lessonId, JSON.stringify({data:data, timestamp:Date.now()})); } catch(e){}
        document.getElementById('retryBanner').style.display = 'block';
        showPopup({
            type:'error', icon:'❌', title:'فشل الإرسال',
            body:`<p>حدث خطأ أثناء الإرسال.</p><div class="popup-detail">${esc(r.error || 'خطأ غير معروف')}</div>`,
            buttons:[{text:'🔄 إعادة المحاولة',class:'primary',action:()=>{closePopup();retrySubmit();}},{text:'إغلاق',class:'secondary'}]
        });
    }
}
async function retrySubmit() {
    if (!lastFailedData) {
        try { const p = safeStorage.getItem('ia_pending_'+LESSON_CONFIG.lessonId); if (p) lastFailedData = JSON.parse(p).data; } catch(e){}
        if (!lastFailedData) {
            showPopup({type:'warning',title:'لا توجد بيانات',body:'مفيش بيانات للإعادة.',buttons:[{text:'حسناً',class:'primary'}]});
            return;
        }
    }
    showLoading('جاري إعادة المحاولة...');
    const r = await sendAndVerify(lastFailedData);
    hideLoading();
    if (r.verified) {
        safeStorage.removeItem('ia_pending_'+LESSON_CONFIG.lessonId);
        lastFailedData = null;
        showPopup({type:'success',title:'تم بنجاح!',body:'تم حفظ بياناتك. سيتم إعادة تحميل الصفحة.',buttons:[{text:'حسناً',class:'primary',action:()=>location.reload()}]});
    } else {
        showPopup({type:'error',title:'فشلت المحاولة',body:esc(r.error || 'حاول مرة أخرى لاحقاً.'),buttons:[{text:'حسناً',class:'primary'}]});
    }
}

// ============================================================
// ⭐ نظام تصحيح المعلم
// ============================================================
let isTeacherGradingMode = false;
let teacherGrades = {};
let studentUsername = '';

function checkTeacherGradingMode() {
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    studentUsername = params.get('student');
    if (mode === 'grading' && studentUsername) {
        isTeacherGradingMode = true;
        document.body.classList.add('teacher-grading-mode');
    }
}

async function startAppClient() {
    checkTeacherGradingMode();
    if (isTeacherGradingMode) {
        const ub = document.querySelector('.user-bar'); if(ub) ub.style.display = 'none';
        const ps = document.querySelector('.progress-summary'); if(ps) ps.style.display = 'none';
        const bn = document.querySelector('.bottom-nav'); if(bn) bn.style.display = 'none';
        initTeacherGrading();
        return; 
    }
    const scb = document.getElementById('spanishCharsBar'); if(scb) scb.style.display = 'flex';
    if(document.getElementById('lessonHeaderName')) document.getElementById('lessonHeaderName').textContent = LESSON_CONFIG.lessonName;
    if(document.getElementById('lessonHeaderBadge')) document.getElementById('lessonHeaderBadge').textContent = LESSON_CONFIG.levelDisplay;
    document.title = 'Instituto Amigos - ' + LESSON_CONFIG.levelDisplay + ' - ' + LESSON_CONFIG.lessonName;
    
    renderSlides();
    initSlider();
    updateProgressDisplay();
    checkAllTranscripts();
    
    showLoading('جاري مزامنة بياناتك...');
    try {
        await Promise.race([
            loadProgress(),
            new Promise(r => setTimeout(r, 1200))
        ]);
    } catch(e){} finally {
        hideLoading();
    }
    
    try {
        const p = safeStorage.getItem('ia_pending_'+LESSON_CONFIG.lessonId);
        if (p) {
            lastFailedData = JSON.parse(p).data;
            document.getElementById('retryBanner').style.display = 'block';
        }
    } catch(e){}
}

if (document.readyState !== 'loading') {
    setTimeout(startAppClient, 10);
} else {
    window.addEventListener('DOMContentLoaded', startAppClient);
}

async function initTeacherGrading() {
    const header = document.createElement('div');
    header.className = 'teacher-grading-banner';
    header.innerHTML = `
        <div class="grading-info-bar">
            <span class="grading-icon">👨‍🏫</span>
            <span>وضع تصحيح المعلم</span>
            <span class="divider">|</span>
            <span>📋 الطالب: <strong>${studentUsername}</strong></span>
            <span>📚 ${LESSON_CONFIG.lessonName}</span>
            <button class="save-grades-btn-top" onclick="saveAllGrades()">💾 حفظ التصحيحات وإرسالها</button>
        </div>
    `;
    document.querySelector('.slider-wrapper').prepend(header);
    
    // ✅ Show slides normally with slider (same as student)
    renderSlides();
    initSlider();
    
    // Hide submit button in teacher mode
    document.querySelectorAll('.submit-btn, [onclick*="submit"]').forEach(btn => {
        btn.style.display = 'none';
    });

    Object.keys(TRANSCRIPTIONS).forEach(k => {
        const btn = document.getElementById('trBtn_'+k);
        const prog = document.getElementById('trProg_'+k);
        if (btn) {
            btn.disabled = false;
            btn.querySelector('.lock-icon').textContent = '🔓';
            if (prog) prog.style.display = 'none';
        }
    });

    showLoading('جاري تحميل إجابات الطالب للتصحيح...');
    
    // ✅ First load all submitted answers (correct/wrong/pending)
    try {
        const progUrl = SCRIPT_URL + '?action=getProgress&username=' + encodeURIComponent(studentUsername) + '&lessonId=' + encodeURIComponent(LESSON_CONFIG.lessonId) + '&_t=' + Date.now();
        const progRes = await fetch(progUrl);
        const progData = await progRes.json();
        if (progData.status === 'success' && progData.lockedAnswers && progData.lockedAnswers !== '{}') {
            const allLocked = JSON.parse(progData.lockedAnswers);
            lockedAnswers = allLocked;
            // Show all submitted answers
            Object.keys(allLocked).forEach(qId => {
                const info = allLocked[qId];
                const el = document.getElementById(qId);
                if (el && info.value) {
                    el.value = info.value || '';
                    el.disabled = true;
                    if (info.status === 'reviewed') {
                        if (info.isCorrect) {
                            el.style.borderColor = '#27ae60'; el.style.backgroundColor = 'rgba(39,174,96,0.12)'; el.style.color = '#2ecc71';
                        } else if (info.isHalf || info.verdict === 'half') {
                            el.style.borderColor = '#f1c40f'; el.style.backgroundColor = 'rgba(241,196,15,0.12)'; el.style.color = '#f1c40f';
                        } else {
                            el.style.borderColor = '#e74c3c'; el.style.backgroundColor = 'rgba(231,76,60,0.12)'; el.style.color = '#ff7675';
                        }
                    } else if (info.status === 'pending') {
                        el.style.borderColor = '#9b59b6'; el.style.backgroundColor = 'rgba(155,89,182,0.12)'; el.style.color = '#d5a6f0';
                    }
                }
            });
            // Update jump buttons with locked status
            updateJumpButtonStatus();
        }
    } catch(e) { console.error('Error loading progress:', e); }
    
    // ✅ Load pending details for grading
    try {
        const url = SCRIPT_URL + '?action=getStudentDetails&username=' + encodeURIComponent(studentUsername) + '&lessonId=' + encodeURIComponent(LESSON_CONFIG.lessonId) + '&_t=' + Date.now();
        const res = await fetch(url);
        const data = await res.json();
        
        hideLoading();
        if (data.status === 'success' && data.student) {
            applyGradingModeToQuestions(data.student.pendingAnswers || {});
        } else {
            showPopup({type:'info', title:'تنبيه', body:'لا توجد أسئلة جديدة بانتظار التصحيح لهذا الطالب.', buttons:[{text:'حسناً', class:'primary'}]});
        }
    } catch (e) {
        hideLoading();
        showPopup({type:'error', title:'خطأ اتصال', body:'فشل جلب البيانات: ' + e.message, buttons:[{text:'حسناً', class:'primary'}]});
    }
    
    addGradingStyles();
}

function applyGradingModeToQuestions(pendingAnswers) {
    const pendingKeys = Object.keys(pendingAnswers);
    if (pendingKeys.length === 0) {
        showPopup({type:'info', title:'تم', body:'لا توجد أسئلة جديدة بانتظار التصحيح لهذا الطالب.', buttons:[{text:'حسناً', class:'primary'}]});
        return;
    }
    
    pendingKeys.forEach(qId => {
        const studentAnswer = pendingAnswers[qId];
        const questionEl = document.getElementById(qId);
        
        if (!questionEl) return;
        
        teacherGrades[qId] = {
            value: studentAnswer.value || '',
            verdict: '',
            feedback: ''
        };
        
        const correctAnswer = getCorrectAnswer(qId);
        const qCard = questionEl.closest('.question-card') || questionEl.parentElement;
        qCard.classList.add('pending-grading');
        
        questionEl.value = studentAnswer.value || '';
        questionEl.disabled = true;
        questionEl.style.backgroundColor = 'rgba(243, 156, 18, 0.15)'; 
        questionEl.style.color = '#f39c12';
        questionEl.style.fontWeight = 'bold';

        const gradingHTML = `
            <div class="grading-overlay" id="grading_${qId}">
                ${correctAnswer ? `
                <div class="grading-answer-box correct-answer-box">
                    <div class="answer-label">✅ الإجابة النموذجية (لمساعدتك):</div>
                    <div class="answer-content" dir="auto">${esc(correctAnswer)}</div>
                </div>` : ''}
                
                <div class="grading-controls">
                    <div class="verdict-buttons">
                        <span class="verdict-label">🏷️ التقييم:</span>
                        <button class="verdict-btn correct" onclick="selectVerdict('${qId}', 'correct')">✅ صحيح</button>
                        <button class="verdict-btn half" onclick="selectVerdict('${qId}', 'half')">➗ نصف</button>
                        <button class="verdict-btn wrong" onclick="selectVerdict('${qId}', 'wrong')">❌ خطأ</button>
                    </div>
                    <div class="feedback-section">
                        <label>💬 تعليق / فيدباك (اختياري):</label>
                        <textarea id="feedback_${qId}" dir="auto" placeholder="اكتب ملاحظاتك للطالب هنا..." oninput="updateFeedback('${qId}', this.value)"></textarea>
                    </div>
                    <div class="verdict-status" id="status_${qId}">
                        <span class="not-graded">⏳ بانتظار تقييمك</span>
                    </div>
                </div>
            </div>
        `;
        
        const fbBox = document.getElementById('fb' + qId.substring(1));
        if (fbBox) {
            fbBox.insertAdjacentHTML('afterend', gradingHTML);
        } else {
            questionEl.insertAdjacentHTML('afterend', gradingHTML);
        }
    });
}

function getCorrectAnswer(qId) {
    if (AUTO_GRADED[qId]) {
        const ag = AUTO_GRADED[qId];
        if (ag.a && Array.isArray(ag.a)) return ag.a.join(' أو ');
        if (ag.a) return ag.a;
    }
    const qData = TEACHER_GRADED_CONTEXT[qId];
    if (qData && qData.expectedAnswer) return qData.expectedAnswer;
    return null;
}

function selectVerdict(qId, verdict) {
    teacherGrades[qId].verdict = verdict;
    const el = document.getElementById('grading_' + qId);
    if (!el) return;
    
    el.querySelectorAll('.verdict-btn').forEach(b => b.classList.remove('selected'));
    const statusEl = document.getElementById('status_' + qId);
    
    if (verdict === 'correct') {
        el.querySelector('.verdict-btn.correct').classList.add('selected');
        statusEl.innerHTML = '<span class="verdict-done correct">✅ تم التقييم: صحيح</span>';
    } else if (verdict === 'half') {
        el.querySelector('.verdict-btn.half').classList.add('selected');
        statusEl.innerHTML = '<span class="verdict-done half">➗ تم التقييم: نصف درجة</span>';
    } else if (verdict === 'wrong') {
        el.querySelector('.verdict-btn.wrong').classList.add('selected');
        statusEl.innerHTML = '<span class="verdict-done wrong">❌ تم التقييم: خطأ</span>';
    }
}

function updateFeedback(qId, v) { 
    teacherGrades[qId].feedback = v; 
}

async function saveAllGrades() {
    const ungraded = Object.keys(teacherGrades).filter(qId => !teacherGrades[qId].verdict);
    if (ungraded.length > 0) {
        if (!confirm(`يوجد ${ungraded.length} سؤال لم تقم بتقييمهم. هل تريد المتابعة وحفظ ما تم تصحيحه فقط؟`)) return;
    }
    
    showLoading('جاري حفظ التصحيحات وإرسالها للطالب...');
    
    let tc = 0, th = 0, tw = 0;
    Object.keys(teacherGrades).forEach(qId => {
        if (teacherGrades[qId].verdict === 'correct') tc++;
        else if (teacherGrades[qId].verdict === 'half') th++;
        else if (teacherGrades[qId].verdict === 'wrong') tw++;
    });

    // ✅ إرسال التصحيحات عبر GET + POST (dual backup)
    const getUrl = SCRIPT_URL 
        + '?action=saveTeacherGrading'
        + '&username=' + encodeURIComponent(studentUsername)
        + '&lessonId=' + encodeURIComponent(LESSON_CONFIG.lessonId)
        + '&teacherGrades=' + encodeURIComponent(JSON.stringify(teacherGrades))
        + '&totalCorrect=' + tc
        + '&totalHalf=' + th
        + '&totalWrong=' + tw
        + '&_t=' + Date.now();
    
    const formPayload = { 
        action: 'saveTeacherGrading', 
        username: studentUsername, 
        lessonId: LESSON_CONFIG.lessonId, 
        teacherGrades: JSON.stringify(teacherGrades), 
        totalCorrect: tc, 
        totalHalf: th, 
        totalWrong: tw 
    };
    
    try {
        await Promise.all([
            fetch(getUrl, { mode: 'no-cors' }).catch(function(){}),
            sendDataViaForm(formPayload)
        ]);
        hideLoading();
        showPopup({
            type:'success', title:'تم بنجاح ✅', body:'تم إرسال التقييم للطالب بنجاح!', 
            buttons:[{text:'إغلاق النافذة', class:'primary', action:() => { window.close(); } }]
        });
    } catch (e) { 
        hideLoading(); 
        showPopup({type:'error', title:'خطأ', body:'فشل الحفظ: ' + e.message, buttons:[{text:'إعادة المحاولة', class:'primary', action:function(){ saveAllGrades(); } },{text:'إلغاء', class:'secondary', action:closePopup}]});
    }
}
