const KEY='IA_A1_U2_vocab_progress_v4';
let progress={}, deck=[], idx=0, flipped=false, currentCat='all', quiz=null;
const $=id=>document.getElementById(id);
function todayKey(){return new Date().toISOString().slice(0,10)}
function load(){try{progress=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){progress={}}; if(!progress.meta)progress.meta={streak:0,last:''}; CARDS.forEach((c,i)=>{if(!progress[i])progress[i]={level:0,due:0,seen:0,ok:0,bad:0}}); updateStreak();}
function save(){localStorage.setItem(KEY,JSON.stringify(progress)); stats(); renderAll(); renderCats();}
function updateStreak(){const t=todayKey(); if(progress.meta.last!==t){let y=new Date(); y.setDate(y.getDate()-1); const yy=y.toISOString().slice(0,10); progress.meta.streak=(progress.meta.last===yy)?(progress.meta.streak||0)+1:1; progress.meta.last=t; localStorage.setItem(KEY,JSON.stringify(progress));}}
function due(i){return (progress[i]?.due||0)<=Date.now()}
function showPanel(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); $(id).classList.add('active'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); if(btn)btn.classList.add('active'); if(id==='quiz')nextQuiz(); if(id==='all')renderAll(); window.scrollTo({top:0,behavior:'smooth'})}
function stats(){let mastered=0,dueN=0; CARDS.forEach((c,i)=>{if((progress[i].level||0)>=5)mastered++; if(due(i))dueN++;}); $('stTotal').textContent=CARDS.length; $('stMastered').textContent=mastered; $('stDue').textContent=dueN; $('stStreak').textContent=progress.meta.streak||0;}
function renderCats(){const cs=['all',...new Set(CARDS.map(c=>c.cat))]; $('cats').innerHTML=cs.map(c=>`<button class="pill ${c===currentCat?'active':''}" data-cat="${c}">${c==='all'?'الكل':c}</button>`).join(''); document.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>setCat(b.dataset.cat))); if($('catsOpen')) $('catsOpen').textContent='🏷️ '+(currentCat==='all'?'الفئات':currentCat);}
function baseDeck(){return CARDS.map((x,i)=>({...x,i})).filter(x=>currentCat==='all'||x.cat===currentCat)}
function setCat(c){currentCat=c; deck=baseDeck(); idx=0; renderCats(); renderCard(); closeCats();}
function shuffleDeck(arr){return [...arr].sort(()=>Math.random()-.5)}
function resetSession(){deck=shuffleDeck(baseDeck()); idx=0; renderCard();}
function startDue(){deck=shuffleDeck(CARDS.map((x,i)=>({...x,i})).filter(x=>due(x.i)&&(currentCat==='all'||x.cat===currentCat))); if(!deck.length)deck=shuffleDeck(baseDeck()); idx=0; renderCard(); toast('بدأت مراجعة اليوم')}
function currentCard(){if(!deck.length)deck=shuffleDeck(baseDeck()); return deck[((idx%deck.length)+deck.length)%deck.length]}
function renderCard(){const c=currentCard(), p=progress[c.i]; flipped=false; $('card').classList.remove('flipped'); $('emoji').textContent=c.emoji||'⭐'; $('word').textContent=c.es; $('backWord').textContent=c.es; $('meaning').textContent=c.ar; $('tag').textContent=c.tag||c.cat; $('cardLevel').style.width=((p.level||0)/5*100)+'%';}
function flipCard(){flipped=!flipped; $('card').classList.toggle('flipped',flipped)}
function speak(text){if(!('speechSynthesis'in window))return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(String(text).replace(/[¿¡]/g,'')); u.lang='es-ES'; u.rate=.86; speechSynthesis.speak(u)}
function speakCurrent(){speak(currentCard().speak)}
function rateCard(r){const c=currentCard(), p=progress[c.i]; p.seen++; if(r===2){p.ok++;p.level=Math.min(5,(p.level||0)+1)} else if(r===1){p.bad++;p.level=Math.max(1,p.level||1)} else {p.bad++;p.level=0} const days=[0,0.02,1,2,4,7][p.level]||10; p.due=Date.now()+days*86400000; save(); idx++; renderCard();}
function nextQuiz(){const pool=shuffleDeck(CARDS.map((c,i)=>({...c,i}))); quiz=pool[0]; $('qWord').textContent=quiz.es; const opts=shuffleDeck([quiz,...pool.filter(x=>x.i!==quiz.i).slice(0,3)]); $('qOptions').innerHTML=opts.map(o=>`<button class="opt" data-id="${o.i}">${o.ar}</button>`).join(''); $('qFeedback').textContent=''; document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>answerQuiz(Number(b.dataset.id),b)));}
function answerQuiz(id,btn){document.querySelectorAll('.opt').forEach(o=>o.disabled=true); const ok=id===quiz.i; btn.classList.add(ok?'correct':'wrong'); if(!ok){[...document.querySelectorAll('.opt')].find(o=>Number(o.dataset.id)===quiz.i)?.classList.add('correct')} $('qFeedback').textContent=ok?'¡Correcto! ممتاز 👏':'خطأ. الإجابة الصحيحة: '+quiz.ar; const p=progress[quiz.i]; if(ok){p.ok++;p.level=Math.min(5,(p.level||0)+1)}else{p.bad++;p.level=Math.max(0,(p.level||0)-1)} p.seen++; p.due=Date.now()+([0,0.02,1,2,4,7][p.level]||10)*86400000; save();}
function speakQuiz(){if(quiz)speak(quiz.speak)}
function renderAll(){const q=($('search').value||'').toLowerCase().trim(); $('allGrid').innerHTML=CARDS.map((c,i)=>({...c,i})).filter(c=>!q||c.es.toLowerCase().includes(q)||c.ar.toLowerCase().includes(q)||c.cat.toLowerCase().includes(q)).map(c=>`<div class="mini" data-id="${c.i}"><div class="mword">${c.emoji} ${c.es}</div><div class="mar">${c.ar}</div><div class="level"><i style="width:${(progress[c.i].level||0)/5*100}%"></i></div></div>`).join(''); document.querySelectorAll('.mini').forEach(m=>m.addEventListener('click',()=>{const id=Number(m.dataset.id); currentCat='all'; deck=[{...CARDS[id],i:id}]; idx=0; showPanel('study',document.querySelector('.tab[data-panel="study"]')); renderCard();}));}
function toast(t){const el=$('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1500)}
function openCats(){$('catModal').classList.add('show'); $('catModal').setAttribute('aria-hidden','false')}
function closeCats(){$('catModal').classList.remove('show'); $('catModal').setAttribute('aria-hidden','true')}

document.addEventListener('DOMContentLoaded',()=>{
  load(); stats(); deck=shuffleDeck(baseDeck()); renderCard(); renderCats();
  document.querySelectorAll('.tab[data-panel]').forEach(b=>b.addEventListener('click',()=>showPanel(b.dataset.panel,b)));
  $('card').addEventListener('click',flipCard);
  $('speakBtn').addEventListener('click',e=>{e.stopPropagation(); speakCurrent()});
  $('badBtn').addEventListener('click',e=>{e.stopPropagation(); rateCard(0)});
  $('hardBtn').addEventListener('click',e=>{e.stopPropagation(); rateCard(1)});
  $('goodBtn').addEventListener('click',e=>{e.stopPropagation(); rateCard(2)});
  $('dueBtn').addEventListener('click',startDue);
  $('shuffleBtn').addEventListener('click',resetSession);
  $('resetBtn').addEventListener('click',()=>{if(confirm('هل تريد تصفير تقدمك في هذه الوحدة؟')){localStorage.removeItem(KEY); progress={}; load(); stats(); renderCard(); toast('تم تصفير التقدم')}});
  $('search').addEventListener('input',renderAll);
  $('speakQuizBtn').addEventListener('click',speakQuiz);
  $('nextQuizBtn').addEventListener('click',nextQuiz);
  $('catsOpen').addEventListener('click',openCats);
  $('catClose').addEventListener('click',closeCats);
  $('catBackdrop').addEventListener('click',closeCats);
});

</script></body></html>
